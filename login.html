<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAPEOPT | Вход</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-title">VAPEOPT</div>
            <div class="login-subtitle">Вход в панель</div>
        </div>
        
        <form id="login-form">
            <div class="form-group">
                <label class="form-label">📧 Email</label>
                <input type="email" id="email" class="form-input" placeholder="admin@example.com" required autofocus>
            </div>
            
            <div class="form-group">
                <label class="form-label">🔑 Пароль</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="login-btn">🚀 Войти</button>
            <div id="message" class="message"></div>
        </form>
        
        <div class="login-footer">
            <a href="index.html" class="back-to-site">← Вернуться на сайт</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
