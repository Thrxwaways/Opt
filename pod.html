<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAPEOPT | КАТАЛОГ ЭЛ.СИГАРЕТ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            font-family: 'Montserrat', 'Orbitron', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap');

        body {
            background: #03050f;
            background-image: radial-gradient(ellipse at 50% 30%, #1b2b55 0%, #020412 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        a:focus, button:focus, div:focus, .product-card:focus, .modal-item:focus, .quantity-btn:focus, .back-link:focus {
            outline: none !important;
            box-shadow: none !important;
        }

        :focus { outline: none !important; }
        ::-moz-focus-inner { border: 0; }

        .ship-hud {
            width: 100%;
            max-width: 500px;
            height: 95vh;
            max-height: 900px;
            background: rgba(2, 10, 22, 0.8);
            backdrop-filter: blur(12px);
            border: 3px solid #3e7bff;
            border-radius: 50px;
            box-shadow: 0 0 60px #1e4fcf, 0 0 30px #3e7bff inset;
            padding: 30px 22px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .ship-hud::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 10px;
            background: linear-gradient(90deg, transparent, #3e7bff, transparent);
            animation: scanLine 4s linear infinite;
            opacity: 0.5;
        }

        @keyframes scanLine {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .hologram-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border: 2px dashed #3e7bff30;
            border-radius: 50%;
            pointer-events: none;
            animation: rotateRing 20s linear infinite;
        }

        .hologram-ring2 {
            width: 300px;
            height: 300px;
            border: 1px solid #3e7bff20;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotateRingReverse 15s linear infinite;
        }

        @keyframes rotateRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes rotateRingReverse {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(-360deg); }
        }

        .ship-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }

        .ship-title {
            display: flex;
            flex-direction: column;
        }

        .ship-name {
            font-size: 2rem;
            font-weight: 900;
            color: #8fb8ff;
            text-shadow: 0 0 20px #3e7bff, 0 0 40px #1e4fcf;
            letter-spacing: 3px;
            line-height: 1;
            font-family: 'Orbitron', sans-serif;
            animation: glowPulse 3s ease-in-out infinite;
        }

        .ship-sub {
            font-size: 0.7rem;
            color: #afc9ff;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 20px #3e7bff, 0 0 40px #1e4fcf; }
            50% { text-shadow: 0 0 30px #5f9eff, 0 0 60px #2f6fdf; }
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .cart-icon {
            position: relative;
            background: #10213f;
            border: 2px solid #3e7bff;
            color: #8fb8ff;
            width: 45px;
            height: 45px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            text-decoration: none;
            box-shadow: 0 0 20px #3e7bff;
            transition: 0.2s;
            cursor: pointer;
        }

        .cart-icon:hover {
            background: #3e7bff;
            color: black;
            transform: scale(1.1);
        }

        .cart-icon.hidden {
            display: none;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            font-size: 0.7rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #3e7bff;
            box-shadow: 0 0 10px #e74c3c;
        }

        .back-link {
            background: #10213f;
            border: 2px solid #3e7bff;
            color: #8fb8ff;
            width: 45px;
            height: 45px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            text-decoration: none;
            box-shadow: 0 0 20px #3e7bff;
            transition: 0.2s;
            position: relative;
            overflow: hidden;
        }

        .back-link::before {
            content: '◄';
            position: relative;
            z-index: 2;
        }

        .back-link:hover {
            color: black;
            transform: scale(1.1);
            background: #3e7bff;
        }

        .products-scroll {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            position: relative;
            z-index: 2;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #8fb8ff;
            margin: 20px 0 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #3e7bff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Montserrat', sans-serif;
            position: sticky;
            top: 0;
            background: rgba(2, 10, 22, 0.9);
            backdrop-filter: blur(5px);
            z-index: 5;
            padding-top: 5px;
        }

        .section-title.in-stock {
            color: #3e7bff;
            border-bottom-color: #3e7bff;
        }

        .section-title.out-of-stock {
            color: #a0aec0;
            border-bottom-color: #a0aec0;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .product-card {
            background: rgba(8, 20, 40, 0.7);
            backdrop-filter: blur(5px);
            border: 3px solid #3e7bff;
            border-radius: 25px;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-3px);
            border-color: #8fb8ff;
            box-shadow: 0 0 30px #3e7bff;
        }

        .product-card.out-of-stock {
            border-color: #4a5568;
            background: rgba(45, 55, 72, 0.5);
            cursor: not-allowed;
            opacity: 0.8;
        }

        .product-card.out-of-stock:hover {
            transform: none;
            border-color: #4a5568;
            box-shadow: none;
        }

        .product-card.out-of-stock .product-image {
            border-color: #4a5568;
            opacity: 0.7;
        }

        .product-card.out-of-stock .product-name {
            color: #a0aec0;
        }

        .product-card.out-of-stock .product-price {
            border-color: #4a5568;
            color: #a0aec0;
            background: rgba(45, 55, 72, 0.3);
        }

        .product-card.new-item::before {
            content: 'НОВИНКА';
            position: absolute;
            top: 10px;
            left: -30px;
            background: #2ecc71;
            color: black;
            padding: 5px 30px;
            transform: rotate(-45deg);
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            box-shadow: 0 0 20px #2ecc71;
            z-index: 3;
        }

        .product-image {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            margin-bottom: 8px;
            object-fit: cover;
            border: 2px solid #3e7bff;
            transition: all 0.3s ease;
        }

        .product-name {
            font-size: 1rem;
            font-weight: 700;
            color: #cfdfff;
            text-align: center;
            margin-bottom: 5px;
        }

        .product-price {
            font-size: 0.9rem;
            color: #2ecc71;
            border: 1px solid #2ecc71;
            padding: 3px 10px;
            border-radius: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .empty-message {
            text-align: center;
            color: #8fb8ff;
            font-size: 1.2rem;
            padding: 40px 20px;
            border: 2px dashed #3e7bff;
            border-radius: 30px;
            background: rgba(8, 20, 40, 0.5);
            margin: 20px 0;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(2, 10, 22, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            width: 90%;
            max-width: 450px;
            height: 80vh;
            background: rgba(8, 20, 40, 0.9);
            border: 3px solid #3e7bff;
            border-radius: 30px;
            box-shadow: 0 0 50px #3e7bff;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .modal-close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(8, 20, 40, 0.8);
            border: 2px solid #e74c3c;
            color: #e74c3c;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .modal-close-btn:hover {
            background: #e74c3c;
            color: black;
            transform: scale(1.1);
            box-shadow: 0 0 20px #e74c3c;
        }

        .modal-header {
            padding: 20px 25px 10px;
            text-align: center;
        }

        .modal-product-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #8fb8ff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .modal-image-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .modal-product-image {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            object-fit: cover;
            border: 3px solid #3e7bff;
            box-shadow: 0 0 30px #3e7bff;
            transition: 0.3s;
        }

        .modal-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 0 25px;
            margin-bottom: 5px;
        }

        .stock-section {
            margin-bottom: 15px;
        }

        .stock-section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            padding-bottom: 3px;
            border-bottom: 2px solid;
            font-weight: 600;
        }

        .stock-section-title.in-stock {
            color: #3e7bff;
            border-bottom-color: #3e7bff;
        }

        .stock-section-title.out-of-stock {
            color: #a0aec0;
            border-bottom-color: #a0aec0;
        }

        .modal-items-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .modal-item {
            border: 2px solid;
            border-radius: 10px;
            padding: 6px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            box-shadow: 0 0 15px rgba(62, 123, 255, 0.3);
        }

        .modal-item.in-stock {
            border-color: #3e7bff;
            background: linear-gradient(145deg, #1e3a5a, #2a4a7a);
            box-shadow: 0 0 20px rgba(62, 123, 255, 0.5);
        }

        .modal-item.in-stock:hover {
            background: linear-gradient(145deg, #2a4a7a, #3a5a9a);
            transform: translateX(2px);
            border-color: #5f9eff;
            box-shadow: 0 0 25px rgba(95, 158, 255, 0.7);
        }

        .modal-item.in-stock.selected {
            animation: selectedPulse 1.5s ease-in-out infinite;
            border-width: 2px;
        }

        @keyframes selectedPulse {
            0% { box-shadow: 0 0 8px rgba(62, 123, 255, 0.6); border-color: #3e7bff; }
            25% { box-shadow: 0 0 15px rgba(95, 158, 255, 0.7); border-color: #5f9eff; }
            50% { box-shadow: 0 0 18px rgba(143, 184, 255, 0.8); border-color: #8fb8ff; }
            75% { box-shadow: 0 0 15px rgba(95, 158, 255, 0.7); border-color: #5f9eff; }
            100% { box-shadow: 0 0 8px rgba(62, 123, 255, 0.6); border-color: #3e7bff; }
        }

        .modal-item.out-of-stock {
            border-color: #4a5568;
            background: rgba(45, 55, 72, 0.3);
            opacity: 0.8;
            cursor: not-allowed;
            box-shadow: none;
        }

        .modal-item.out-of-stock .item-name {
            color: #a0aec0;
        }

        .item-name {
            font-size: 0.85rem;
            color: #e0f0ff;
            margin-bottom: 4px;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        .item-details {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quantity-selector {
            display: none;
            align-items: center;
            gap: 4px;
            background: rgba(8, 20, 40, 0.8);
            border: 1px solid #3e7bff;
            border-radius: 20px;
            padding: 2px 6px;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .quantity-selector.show {
            display: flex;
        }

        .quantity-btn {
            background: linear-gradient(145deg, #1a2a4a, #0f1a30);
            border: 1px solid #3e7bff;
            color: #8fb8ff;
            width: 22px;
            height: 22px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .quantity-btn:hover {
            background: #3e7bff;
            color: black;
        }

        .quantity-input {
            width: 32px;
            background: rgba(8, 20, 40, 0.7);
            border: 1px solid #3e7bff;
            border-radius: 8px;
            padding: 2px;
            text-align: center;
            color: #8fb8ff;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .quantity-input:focus {
            outline: none;
            box-shadow: 0 0 8px #3e7bff;
        }

        .modal-footer {
            background: rgba(8, 20, 40, 0.95);
            backdrop-filter: blur(10px);
            border-top: 2px solid #3e7bff;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 0 0 30px 30px;
            margin-top: 5px;
        }

        .total-price {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .price-label {
            color: #8fb8ff;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price-value {
            color: #2ecc71;
            font-size: 1.1rem;
            font-weight: 800;
            text-shadow: 0 0 8px #2ecc71;
        }

        .price-currency {
            color: #8fb8ff;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 2px;
        }

        .modal-order-btn {
            background: linear-gradient(145deg, #1a3a2a, #0f2a1a);
            border: 2px solid #2ecc71;
            color: #2ecc71;
            padding: 5px 18px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 22px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.3);
        }

        .modal-order-btn:hover {
            background: #2ecc71;
            color: black;
            transform: scale(1.03);
            box-shadow: 0 0 15px #2ecc71;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(8, 20, 40, 0.95);
            border: 2px solid;
            border-radius: 12px;
            padding: 12px 20px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 2000;
            max-width: 300px;
            border-left-width: 4px;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.warning {
            border-color: #f39c12;
            background: rgba(243, 156, 18, 0.15);
            color: #f39c12;
        }

        .notification.error {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
        }

        .notification.success {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
        }

        .notification-content {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notification-icon {
            font-size: 1.2rem;
        }

        .customer-field label {
            display: block;
            color: #8fb8ff;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            margin-left: 5px;
        }

        .customer-field input {
            width: 100%;
            background: rgba(8, 20, 40, 0.7);
            border: 2px solid #3e7bff;
            border-radius: 30px;
            padding: 10px 15px;
            color: #8fb8ff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }

        .customer-field input:focus {
            border-color: #8fb8ff;
            box-shadow: 0 0 20px #3e7bff;
        }

        .customer-field input::placeholder {
            color: #3e5a80;
        }

        .customer-field.error input {
            border-color: #e74c3c;
            box-shadow: 0 0 15px #e74c3c;
        }

        .cart-summary {
            background: rgba(8, 20, 40, 0.7);
            border: 2px solid #3e7bff;
            border-radius: 20px;
            padding: 12px 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary-left {
            display: flex;
            flex-direction: column;
        }

        .summary-label {
            color: #8fb8ff;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .summary-value {
            color: #8fb8ff;
            font-size: 1rem;
            font-weight: 700;
        }

        .summary-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .summary-price-label {
            color: #8fb8ff;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .summary-price {
            color: #2ecc71;
            font-size: 1.3rem;
            font-weight: 800;
            text-shadow: 0 0 8px #2ecc71;
        }

        .summary-currency {
            color: #8fb8ff;
            font-size: 0.8rem;
            margin-left: 2px;
        }

        .checkout-btn {
            width: 100%;
            background: #10213f;
            border: 3px solid #2ecc71;
            color: #2ecc71;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .checkout-btn:hover {
            background: #2ecc71;
            color: black;
            box-shadow: 0 0 30px #2ecc71;
        }

        @media (max-width: 400px) {
            .ship-name { font-size: 1.8rem; }
            .product-image { width: 60px; height: 60px; }
            .modal-footer { flex-direction: column; gap: 8px; }
            .modal-order-btn { width: 100%; }
            .modal-product-image { width: 130px; height: 130px; }
            .item-details { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="ship-hud">
        <div class="hologram-ring"></div>
        <div class="hologram-ring2"></div>

        <div class="ship-header">
            <div class="ship-title">
                <div class="ship-name">VAPEOPT</div>
                <div class="ship-sub">КАТАЛОГ ЭЛ.СИГАРЕТ</div>
            </div>
            <div class="header-controls">
                <div class="cart-icon hidden" id="cartIcon">
                    🛒
                    <span class="cart-count" id="cartCount">0</span>
                </div>
                <a href="index.html" class="back-link" title="Назад"></a>
            </div>
        </div>

        <div class="products-scroll" id="productsContainer">
            <!-- Товары будут загружаться сюда -->
        </div>
    </div>

    <div class="notification" id="notification">
        <div class="notification-content">
            <span class="notification-icon" id="notificationIcon">⚡</span>
            <span id="notificationMessage"></span>
        </div>
    </div>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <button class="modal-close-btn" id="modalCloseBtn">✕</button>
            
            <div class="modal-header">
                <div class="modal-product-name" id="modalProductName"></div>
                <div class="modal-image-container">
                    <img src="" alt="" class="modal-product-image" id="modalImage">
                </div>
            </div>

            <div class="modal-scroll-area" id="modalScrollArea">
                <div id="modalItemsContainer"></div>
            </div>

            <div class="modal-footer">
                <div class="total-price">
                    <span class="price-label">ЦЕНА ЗА ШТ:</span>
                    <span class="price-value" id="modalPrice">0</span>
                    <span class="price-currency">Br</span>
                </div>
                <button class="modal-order-btn" id="modalOrderBtn">В КОРЗИНУ</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно корзины -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>🛒 КОРЗИНА</h2>
                <button class="close-cart" id="closeCart">✕</button>
            </div>
            
            <div class="cart-items-grid" id="cartItemsGrid">
                <!-- Товары будут загружаться сюда -->
            </div>

            <div class="cart-footer">
                <div class="customer-fields">
                    <div class="customer-field" id="telegramField">
                        <label>📱 TELEGRAM USERNAME</label>
                        <input type="text" id="telegramUsername" placeholder="@username" autocomplete="off">
                    </div>
                    <div class="customer-field" id="nameField">
                        <label>👤 ИМЯ</label>
                        <input type="text" id="customerName" placeholder="Введите ваше имя" autocomplete="off">
                    </div>
                </div>

                <div class="cart-summary">
                    <div class="summary-left">
                        <span class="summary-label">ТОВАРОВ:</span>
                        <span class="summary-value" id="summaryItems">0</span>
                    </div>
                    <div class="summary-right">
                        <span class="summary-price-label">ИТОГО:</span>
                        <span class="summary-price" id="summaryPrice">0</span>
                        <span class="summary-currency">Br</span>
                    </div>
                </div>

                <button class="checkout-btn" id="checkoutBtn">ОФОРМИТЬ ЗАКАЗ</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <!-- Скрипт корзины -->
    <script src="cart-script.js"></script>

    <script>
        // Константа для коллекции
        const COLLECTION_NAME = 'pod';
        
        let products = [];
        let currentProductIndex = -1;
        let selectedItemIndex = -1;

        // Загрузка товаров из Firebase
        async function loadProducts() {
            try {
                products = await FirestoreService.getCollection(COLLECTION_NAME);
                displayProducts();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                products = [];
                displayProducts();
            }
        }

        function displayProducts() {
            const container = document.getElementById('productsContainer');
            
            if (products.length === 0) {
                container.innerHTML = '<div class="empty-message">НА ДАННЫЙ МОМЕНТ ТОВАРОВ НЕТ</div>';
                return;
            }

            const inStockProducts = products.filter(product => 
                product.items && product.items.some(item => item.inStock !== false)
            );
            
            const outOfStockProducts = products.filter(product => 
                !product.items || !product.items.some(item => item.inStock !== false)
            );

            let html = '';

            if (inStockProducts.length > 0) {
                html += '<div class="section-title in-stock">✔ В НАЛИЧИИ</div>';
                html += '<div class="products-grid">';
                
                inStockProducts.forEach((product, index) => {
                    const originalIndex = products.findIndex(p => p.id === product.id);
                    
                    html += `
                        <div class="product-card ${product.isNew ? 'new-item' : ''}" onclick="openProductModal(${originalIndex})">
                            <img src="${product.image || 'https://via.placeholder.com/80x80/10213f/3e7bff?text=' + encodeURIComponent((product.name || 'Товар').substring(0, 3))}" 
                                 alt="${product.name}" 
                                 class="product-image"
                                 onerror="this.src='https://via.placeholder.com/80x80/10213f/3e7bff?text=Нет+фото'">
                            <div class="product-name">${product.name || 'Без названия'}</div>
                            <div class="product-price">${product.price || 0} Br</div>
                        </div>
                    `;
                });
                
                html += '</div>';
            }

            if (outOfStockProducts.length > 0) {
                html += '<div class="section-title out-of-stock">✖ НЕТ В НАЛИЧИИ</div>';
                html += '<div class="products-grid">';
                
                outOfStockProducts.forEach((product, index) => {
                    const originalIndex = products.findIndex(p => p.id === product.id);
                    
                    html += `
                        <div class="product-card out-of-stock" onclick="showOutOfStockNotification()">
                            <img src="${product.image || 'https://via.placeholder.com/80x80/4a5568/718096?text=' + encodeURIComponent((product.name || 'Товар').substring(0, 3))}" 
                                 alt="${product.name}" 
                                 class="product-image"
                                 onerror="this.src='https://via.placeholder.com/80x80/4a5568/718096?text=Нет+фото'">
                            <div class="product-name">${product.name || 'Без названия'}</div>
                            <div class="product-price">${product.price || 0} Br</div>
                        </div>
                    `;
                });
                
                html += '</div>';
            }

            container.innerHTML = html;
        }

        window.showOutOfStockNotification = function() {
            showNotification('Товара нет в наличии', 'error');
        };

        window.selectItem = function(index, event) {
            if (event) event.stopPropagation();
            
            const product = products[currentProductIndex];
            if (!product || !product.items || !product.items[index] || product.items[index].inStock === false) return;
            
            selectedItemIndex = selectedItemIndex === index ? -1 : index;
            openProductModal(currentProductIndex);
        };

        window.updateQuantity = function(itemIndex, change, event) {
            if (event) event.stopPropagation();
            
            const product = products[currentProductIndex];
            if (!product || !product.items || !product.items[itemIndex]) return;
            
            const item = product.items[itemIndex];
            item.quantity = Math.max(1, (item.quantity || 1) + change);
            
            const input = document.getElementById(`quantity-${itemIndex}`);
            if (input) input.value = item.quantity;
        };

        window.setQuantity = function(itemIndex, value, event) {
            if (event) event.stopPropagation();
            
            const product = products[currentProductIndex];
            if (!product || !product.items || !product.items[itemIndex]) return;
            
            const item = product.items[itemIndex];
            const num = parseInt(value) || 1;
            item.quantity = Math.max(1, num);
        };

        window.openProductModal = function(index) {
            const product = products[index];
            if (!product) return;
            
            currentProductIndex = index;
            
            if (product.items) {
                product.items.forEach(item => {
                    item.quantity = 1;
                });
            }
            
            const modal = document.getElementById('productModal');
            const modalImage = document.getElementById('modalImage');
            const modalPrice = document.getElementById('modalPrice');
            const modalProductName = document.getElementById('modalProductName');
            const modalItemsContainer = document.getElementById('modalItemsContainer');

            modalImage.src = product.image || 'https://via.placeholder.com/150x150/10213f/3e7bff?text=' + encodeURIComponent((product.name || 'Товар').substring(0, 3));
            modalImage.alt = product.name;
            modalPrice.textContent = product.price || 0;
            modalProductName.textContent = product.name || 'Без названия';
            
            const inStockItems = product.items ? product.items.filter(item => item.inStock !== false) : [];
            const outOfStockItems = product.items ? product.items.filter(item => item.inStock === false) : [];
            
            let itemsHtml = '';
            
            if (inStockItems.length > 0) {
                itemsHtml += `
                    <div class="stock-section">
                        <div class="stock-section-title in-stock">✔ В НАЛИЧИИ</div>
                        <div class="modal-items-list">
                `;
                
                inStockItems.forEach((item, idx) => {
                    const originalIndex = product.items.findIndex(i => i.name === item.name);
                    const isSelected = selectedItemIndex === originalIndex;
                    
                    itemsHtml += `
                        <div class="modal-item in-stock ${isSelected ? 'selected' : ''}" onclick="selectItem(${originalIndex}, event)">
                            <div class="item-name">${item.name || 'Без названия'}</div>
                            <div class="item-details">
                                <div class="quantity-selector ${isSelected ? 'show' : ''}" id="selector-${originalIndex}">
                                    <button class="quantity-btn" onclick="updateQuantity(${originalIndex}, -1, event)">−</button>
                                    <input type="text" class="quantity-input" id="quantity-${originalIndex}" value="${item.quantity || 1}" 
                                           onchange="setQuantity(${originalIndex}, this.value, event)" 
                                           onclick="event.stopPropagation()">
                                    <button class="quantity-btn" onclick="updateQuantity(${originalIndex}, 1, event)">+</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                itemsHtml += `</div></div>`;
            }
            
            if (outOfStockItems.length > 0) {
                itemsHtml += `
                    <div class="stock-section">
                        <div class="stock-section-title out-of-stock">✖ НЕТ В НАЛИЧИИ</div>
                        <div class="modal-items-list">
                `;
                
                outOfStockItems.forEach((item) => {
                    itemsHtml += `
                        <div class="modal-item out-of-stock">
                            <div class="item-name">${item.name || 'Без названия'}</div>
                        </div>
                    `;
                });
                
                itemsHtml += `</div></div>`;
            }
            
            modalItemsContainer.innerHTML = itemsHtml;
            modal.classList.add('show');
        };

        // Обновленная функция добавления в корзину (НЕ закрывает модальное окно)
        function addToCart() {
            if (selectedItemIndex === -1) {
                showNotification('Выберите модификацию', 'warning');
                return;
            }
            
            const product = products[currentProductIndex];
            const item = product.items[selectedItemIndex];
            
            if (!item || item.quantity <= 0) {
                showNotification('Укажите количество', 'warning');
                return;
            }

            if (window.addPodToCart) {
                window.addPodToCart(product, item, item.quantity);
                selectedItemIndex = -1;
                openProductModal(currentProductIndex);
            }
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('show');
            if (currentProductIndex !== -1 && products[currentProductIndex] && products[currentProductIndex].items) {
                products[currentProductIndex].items.forEach(item => {
                    item.quantity = 1;
                });
            }
            selectedItemIndex = -1;
        }

        function subscribeToUpdates() {
            FirestoreService.subscribeToCollection(COLLECTION_NAME, (updatedProducts) => {
                products = updatedProducts;
                displayProducts();
            });
        }

        // Функции для работы с корзиной
        async function checkout() {
            const telegramInput = document.getElementById('telegramUsername');
            const nameInput = document.getElementById('customerName');
            const telegramField = document.getElementById('telegramField');
            const nameField = document.getElementById('nameField');
            
            let hasError = false;

            telegramField.classList.remove('error');
            nameField.classList.remove('error');

            if (!telegramInput.value.trim()) {
                telegramField.classList.add('error');
                showNotification('Заполните Telegram username', 'warning');
                telegramInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                hasError = true;
            } else if (!telegramInput.value.trim().startsWith('@')) {
                telegramField.classList.add('error');
                showNotification('Telegram username должен начинаться с @', 'warning');
                telegramInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                hasError = true;
            }

            if (!nameInput.value.trim()) {
                nameField.classList.add('error');
                if (!hasError) {
                    showNotification('Заполните поле Имя', 'warning');
                    nameInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    setTimeout(() => {
                        showNotification('Заполните поле Имя', 'warning');
                    }, 500);
                    telegramField.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
                hasError = true;
            }

            if (hasError || window.cart.length === 0) return;

            try {
                const nextNumber = await getNextOrderNumber();
                
                const order = {
                    orderNumber: nextNumber,
                    orderId: `№${String(nextNumber).padStart(3, '0')}`,
                    items: window.cart,
                    customer: {
                        telegram: telegramInput.value.trim(),
                        name: nameInput.value.trim()
                    },
                    totalItems: window.cart.reduce((sum, item) => sum + item.quantity, 0),
                    totalPrice: window.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0),
                    status: 'pending',
                    createdAt: new Date().toISOString(),
                    currency: 'BYN'
                };

                await FirestoreService.saveDocument('orders', order);
                
                window.cart = [];
                window.saveCart();
                telegramInput.value = '';
                nameInput.value = '';
                
                showNotification('Заказ успешно оформлен!', 'success');
                document.getElementById('cartModal').classList.remove('show');
                
            } catch (error) {
                console.error('Ошибка оформления заказа:', error);
                showNotification('Ошибка при оформлении заказа', 'error');
            }
        }

        async function getNextOrderNumber() {
            try {
                const orders = await FirestoreService.getCollection('orders');
                if (orders.length === 0) return 1;
                const maxNumber = Math.max(...orders.map(o => o.orderNumber || 0));
                return maxNumber + 1;
            } catch (error) {
                console.error('Ошибка получения номера заказа:', error);
                return 1;
            }
        }

        async function init() {
            await loadProducts();
            subscribeToUpdates();

            document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
            document.getElementById('modalOrderBtn').addEventListener('click', addToCart);
            
            document.getElementById('productModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('productModal')) {
                    closeModal();
                }
            });

            // Обработчики для корзины
            const cartModal = document.getElementById('cartModal');
            const closeCart = document.getElementById('closeCart');
            const checkoutBtn = document.getElementById('checkoutBtn');

            closeCart.addEventListener('click', () => {
                cartModal.classList.remove('show');
            });

            checkoutBtn.addEventListener('click', checkout);

            cartModal.addEventListener('click', (e) => {
                if (e.target === cartModal) {
                    cartModal.classList.remove('show');
                }
            });
        }

        init();
    </script>
</body>
</html>
