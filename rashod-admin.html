<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAPEOPT | АДМИН РАСХОДНИКОВ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            font-family: 'Orbitron', 'Arial', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        body {
            background: #03050f;
            background-image: radial-gradient(ellipse at 50% 30%, #1b2b55 0%, #020412 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        a:focus,
        button:focus,
        div:focus,
        .product-card:focus,
        .modal-item:focus,
        .quantity-btn:focus,
        .back-link:focus {
            outline: none !important;
            box-shadow: none !important;
        }

        :focus {
            outline: none !important;
        }

        ::-moz-focus-inner {
            border: 0;
        }

        .ship-hud {
            width: 100%;
            max-width: 500px;
            height: 95vh;
            max-height: 900px;
            background: rgba(2, 10, 22, 0.8);
            backdrop-filter: blur(12px);
            border: 3px solid #3e7bff;
            border-radius: 50px;
            box-shadow: 0 0 60px #1e4fcf, 0 0 30px #3e7bff inset;
            padding: 30px 22px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .ship-hud::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 10px;
            background: linear-gradient(90deg, transparent, #3e7bff, transparent);
            animation: scanLine 4s linear infinite;
            opacity: 0.5;
        }

        @keyframes scanLine {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .hologram-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border: 2px dashed #3e7bff30;
            border-radius: 50%;
            pointer-events: none;
            animation: rotateRing 20s linear infinite;
        }

        .hologram-ring2 {
            width: 300px;
            height: 300px;
            border: 1px solid #3e7bff20;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotateRingReverse 15s linear infinite;
        }

        @keyframes rotateRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes rotateRingReverse {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(-360deg); }
        }

        .ship-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }

        .ship-title {
            display: flex;
            flex-direction: column;
        }

        .ship-name {
            font-size: 2.2rem;
            font-weight: 900;
            color: #8fb8ff;
            text-shadow: 0 0 20px #3e7bff, 0 0 40px #1e4fcf;
            letter-spacing: 3px;
            line-height: 1;
        }

        .ship-sub {
            font-size: 0.7rem;
            color: #afc9ff;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .back-link {
            background: #10213f;
            border: 2px solid #3e7bff;
            color: #8fb8ff;
            width: 45px;
            height: 45px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            text-decoration: none;
            box-shadow: 0 0 20px #3e7bff;
            transition: 0.2s;
        }

        .back-link:hover {
            background: #3e7bff;
            color: black;
            transform: scale(1.1);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            flex: 1;
            align-content: start;
            padding-top: 10px;
            position: relative;
            z-index: 2;
            overflow-y: auto;
            padding-bottom: 10px;
        }

        .product-card {
            background: rgba(8, 20, 40, 0.7);
            backdrop-filter: blur(5px);
            border: 3px solid #3e7bff;
            border-radius: 25px;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px #3e7bff;
        }

        .product-card.add-card {
            border-style: dashed;
            background: rgba(8, 20, 40, 0.3);
        }

        .add-icon {
            font-size: 3rem;
            color: #3e7bff;
            margin-bottom: 10px;
        }

        .add-text {
            color: #8fb8ff;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .product-image {
            width: 70px;
            height: 70px;
            border-radius: 15px;
            margin-bottom: 8px;
            object-fit: cover;
            border: 2px solid #3e7bff;
        }

        .product-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: #cfdfff;
            text-align: center;
            margin-bottom: 5px;
        }

        .product-price {
            font-size: 0.8rem;
            color: #2ecc71;
            border: 1px solid #2ecc71;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .new-badge {
            position: absolute;
            top: 5px;
            left: 5px;
            background: #2ecc71;
            color: black;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.6rem;
            font-weight: 700;
            box-shadow: 0 0 10px #2ecc71;
        }

        .out-of-stock-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #e74c3c;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.6rem;
            box-shadow: 0 0 10px #e74c3c;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(2, 10, 22, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            width: 90%;
            max-width: 450px;
            max-height: 85vh;
            background: rgba(8, 20, 40, 0.9);
            border: 3px solid #3e7bff;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 0 50px #3e7bff;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #3e7bff;
            padding-bottom: 10px;
        }

        .modal-header h2 {
            color: #8fb8ff;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .modal-header-buttons {
            display: flex;
            gap: 10px;
        }

        .close-modal {
            background: none;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            width: 35px;
            height: 35px;
            border-radius: 18px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            background: #e74c3c;
            color: black;
        }

        .delete-btn {
            background: none;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        .delete-btn:hover {
            background: #e74c3c;
            color: black;
        }

        .form-section {
            margin-bottom: 25px;
            border: 1px solid #3e7bff40;
            border-radius: 20px;
            padding: 15px;
        }

        .form-section-title {
            color: #8fb8ff;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-left: 3px solid #3e7bff;
            padding-left: 10px;
        }

        .image-upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .image-preview-container {
            width: 150px;
            height: 150px;
            border: 3px solid #3e7bff;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 20px #3e7bff;
            background: rgba(8, 20, 40, 0.5);
        }

        .image-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3e7bff;
            font-size: 3rem;
            background: rgba(8, 20, 40, 0.5);
        }

        .custom-file-upload {
            position: relative;
            width: 100%;
        }

        .file-input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .file-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #10213f;
            border: 2px solid #3e7bff;
            color: #8fb8ff;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .file-label:hover {
            background: #3e7bff;
            color: black;
            box-shadow: 0 0 20px #3e7bff;
        }

        .file-name {
            color: #8fb8ff;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-label {
            color: #afc9ff;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            display: block;
        }

        .hud-input {
            width: 100%;
            background: rgba(8, 20, 40, 0.7);
            border: 2px solid #3e7bff;
            border-radius: 30px;
            padding: 12px 20px;
            color: #8fb8ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }

        .hud-input:focus {
            border-color: #8fb8ff;
            box-shadow: 0 0 20px #3e7bff;
            background: rgba(12, 30, 60, 0.8);
        }

        .hud-input::placeholder {
            color: #3e5a80;
        }

        .items-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 15px;
        }

        .item-row {
            background: rgba(8, 20, 40, 0.5);
            border: 2px solid #3e7bff;
            border-radius: 20px;
            padding: 15px;
            position: relative;
        }

        .item-row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .item-row-title {
            color: #8fb8ff;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .remove-item {
            background: none;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            width: 30px;
            height: 30px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-item:hover {
            background: #e74c3c;
            color: black;
        }

        .item-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .item-name-input {
            background: rgba(8, 20, 40, 0.7);
            border: 2px solid #3e7bff;
            border-radius: 20px;
            padding: 10px 15px;
            color: #8fb8ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            outline: none;
        }

        .item-name-input::placeholder {
            color: #3e5a80;
        }

        .resistance-input {
            background: rgba(8, 20, 40, 0.7);
            border: 2px solid #3e7bff;
            border-radius: 20px;
            padding: 10px 15px;
            color: #8fb8ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            outline: none;
        }

        .resistance-input::placeholder {
            color: #3e5a80;
        }

        .volume-input {
            background: rgba(8, 20, 40, 0.7);
            border: 2px solid #3e7bff;
            border-radius: 20px;
            padding: 10px 15px;
            color: #8fb8ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            outline: none;
            width: 100%;
            margin-bottom: 10px;
        }

        .volume-input::placeholder {
            color: #3e5a80;
        }

        .item-stock-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding: 8px 12px;
            background: rgba(8, 20, 40, 0.5);
            border: 2px solid #3e7bff;
            border-radius: 15px;
            cursor: pointer;
        }

        .item-stock-checkbox input[type="checkbox"] {
            display: none;
        }

        .item-stock-checkbox .checkbox-custom {
            width: 20px;
            height: 20px;
            border: 2px solid #3e7bff;
            border-radius: 5px;
            display: inline-block;
            position: relative;
            transition: 0.2s;
        }

        .item-stock-checkbox input[type="checkbox"]:checked + .checkbox-custom {
            background: #2ecc71;
            border-color: #2ecc71;
        }

        .item-stock-checkbox input[type="checkbox"]:checked + .checkbox-custom::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: black;
            font-size: 0.8rem;
        }

        .item-stock-checkbox .checkbox-label {
            color: #8fb8ff;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .add-item-btn {
            width: 100%;
            background: #10213f;
            border: 2px dashed #3e7bff;
            color: #8fb8ff;
            padding: 12px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .add-item-btn:hover {
            background: #3e7bff20;
            border-style: solid;
        }

        .checkbox-group {
            display: flex;
            gap: 30px;
            margin: 20px 0;
            padding: 15px;
            background: rgba(8, 20, 40, 0.5);
            border: 2px solid #3e7bff;
            border-radius: 30px;
        }

        .hud-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .hud-checkbox input[type="checkbox"] {
            display: none;
        }

        .checkbox-custom {
            width: 25px;
            height: 25px;
            border: 2px solid #3e7bff;
            border-radius: 8px;
            display: inline-block;
            position: relative;
            transition: 0.2s;
        }

        .hud-checkbox input[type="checkbox"]:checked + .checkbox-custom {
            background: #2ecc71;
            border-color: #2ecc71;
        }

        .hud-checkbox input[type="checkbox"]:checked + .checkbox-custom::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: black;
            font-size: 1rem;
            font-weight: bold;
        }

        .checkbox-label {
            color: #8fb8ff;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .save-btn {
            width: 100%;
            background: #10213f;
            border: 3px solid #2ecc71;
            color: #2ecc71;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
        }

        .save-btn:hover {
            background: #2ecc71;
            color: black;
            box-shadow: 0 0 30px #2ecc71;
        }

        @media (max-width: 400px) {
            .ship-name { font-size: 2rem; }
            .modal-content { padding: 20px; }
            .item-inputs { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="ship-hud">
        <div class="hologram-ring"></div>
        <div class="hologram-ring2"></div>

        <div class="ship-header">
            <div class="ship-title">
                <div class="ship-name">VAPEOPT</div>
                <div class="ship-sub">АДМИН РАСХОДНИКОВ</div>
            </div>
            <a href="admin-panel.html" class="back-link" title="Назад">←</a>
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- Карточки товаров будут добавляться динамически -->
        </div>
    </div>

    <!-- Модальное окно добавления/редактирования -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Добавление товара</h2>
                <div class="modal-header-buttons">
                    <button class="delete-btn" id="deleteBtn" style="display: none;">Удалить</button>
                    <button class="close-modal" id="closeModal">✕</button>
                </div>
            </div>

            <!-- Блок фото -->
            <div class="form-section">
                <div class="form-section-title">Фото товара</div>
                <div class="image-upload-area">
                    <div class="image-preview-container">
                        <img src="" alt="Preview" class="image-preview" id="imagePreview">
                    </div>
                    
                    <div class="custom-file-upload">
                        <input type="file" id="imageInput" accept="image/*" class="file-input">
                        <label for="imageInput" class="file-label">
                            <span>📁</span> Выбрать файл
                        </label>
                        <div class="file-name" id="fileName">Файл не выбран</div>
                    </div>
                </div>
            </div>

            <!-- Название товара -->
            <div class="form-section">
                <div class="form-section-title">Название товара</div>
                <div class="input-group">
                    <input type="text" id="productName" class="hud-input" placeholder="Например: Испарители">
                </div>
            </div>

            <!-- Товары -->
            <div class="form-section">
                <div class="form-section-title">Модификации (с сопротивлением и объемом)</div>
                <div class="items-container" id="itemsContainer"></div>
                <button class="add-item-btn" id="addItemBtn">
                    <span>+</span> Добавить модификацию
                </button>
            </div>

            <!-- Цена -->
            <div class="form-section">
                <div class="form-section-title">Цена (BYN)</div>
                <div class="input-group">
                    <input type="number" id="productPrice" class="hud-input" placeholder="10" step="0.01">
                </div>
            </div>

            <!-- Чекбоксы новинка и наличие -->
            <div class="checkbox-group">
                <label class="hud-checkbox">
                    <input type="checkbox" id="isNew">
                    <span class="checkbox-custom"></span>
                    <span class="checkbox-label">Новинка</span>
                </label>
                <label class="hud-checkbox">
                    <input type="checkbox" id="inStock" checked>
                    <span class="checkbox-custom"></span>
                    <span class="checkbox-label">В наличии</span>
                </label>
            </div>

            <!-- Кнопка сохранения -->
            <button class="save-btn" id="saveBtn">Сохранить</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        // Константа для коллекции
        const COLLECTION_NAME = 'consumables';
        
        let products = [];
        let editingIndex = -1;

        // Загрузка товаров из Firebase
        async function loadProducts() {
            try {
                products = await FirestoreService.getCollection(COLLECTION_NAME);
                displayProducts();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                products = [];
                displayProducts();
            }
        }

        // Сохранение товаров в Firebase
        async function saveProducts() {
            try {
                await FirestoreService.replaceCollection(COLLECTION_NAME, products);
                console.log('Товары успешно сохранены в Firebase');
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                alert('Ошибка при сохранении в Firebase');
            }
        }

        function displayProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            const addCard = document.createElement('div');
            addCard.className = 'product-card add-card';
            addCard.innerHTML = `
                <div class="add-icon">+</div>
                <div class="add-text">ДОБАВИТЬ ТОВАР</div>
            `;
            addCard.onclick = () => openModal('add');
            grid.appendChild(addCard);

            products.forEach((product, index) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                const hasStock = product.items ? product.items.some(item => item.inStock) : true;
                
                card.innerHTML = `
                    <img src="${product.image || 'https://via.placeholder.com/70x70/10213f/3e7bff?text=' + encodeURIComponent((product.name || 'Товар').substring(0, 3))}" 
                         class="product-image"
                         onerror="this.src='https://via.placeholder.com/70x70/10213f/3e7bff?text=Нет+фото'">
                    <div class="product-name">${product.name || 'Без названия'}</div>
                    <div class="product-price">${product.price || 0} BYN</div>
                    ${product.isNew ? '<div class="new-badge">NEW</div>' : ''}
                    ${!hasStock ? '<div class="out-of-stock-badge">НЕТ</div>' : ''}
                `;

                card.onclick = () => openModal('edit', index);
                grid.appendChild(card);
            });
        }

        function openModal(mode, index = -1) {
            const modal = document.getElementById('productModal');
            const modalTitle = document.getElementById('modalTitle');
            const deleteBtn = document.getElementById('deleteBtn');
            const productName = document.getElementById('productName');
            const productPrice = document.getElementById('productPrice');
            const isNew = document.getElementById('isNew');
            const inStock = document.getElementById('inStock');
            const imagePreview = document.getElementById('imagePreview');
            const fileName = document.getElementById('fileName');
            const itemsContainer = document.getElementById('itemsContainer');

            editingIndex = mode === 'edit' ? index : -1;

            if (mode === 'edit' && index >= 0) {
                const product = products[index];
                modalTitle.textContent = 'Редактирование товара';
                deleteBtn.style.display = 'inline-block';
                productName.value = product.name || '';
                productPrice.value = product.price || '';
                isNew.checked = product.isNew || false;
                inStock.checked = product.inStock !== false;
                
                if (product.image) {
                    imagePreview.src = product.image;
                    imagePreview.classList.remove('placeholder');
                    fileName.textContent = 'Фото загружено';
                } else {
                    imagePreview.src = '';
                    imagePreview.classList.add('placeholder');
                    fileName.textContent = 'Файл не выбран';
                }

                itemsContainer.innerHTML = '';
                if (product.items && product.items.length > 0) {
                    product.items.forEach(item => {
                        addItemRow(item.name, item.resistance || '', item.volume || '', item.inStock !== false);
                    });
                } else {
                    addItemRow();
                }
            } else {
                modalTitle.textContent = 'Добавление товара';
                deleteBtn.style.display = 'none';
                productName.value = '';
                productPrice.value = '';
                isNew.checked = false;
                inStock.checked = true;
                imagePreview.src = '';
                imagePreview.classList.add('placeholder');
                fileName.textContent = 'Файл не выбран';
                itemsContainer.innerHTML = '';
                addItemRow();
            }

            modal.classList.add('show');
        }

        function addItemRow(name = '', resistance = '', volume = '', itemInStock = true) {
            const container = document.getElementById('itemsContainer');
            const row = document.createElement('div');
            row.className = 'item-row';
            
            row.innerHTML = `
                <div class="item-row-header">
                    <span class="item-row-title">Модификация</span>
                    <button class="remove-item" onclick="this.closest('.item-row').remove()">✕</button>
                </div>
                <div class="item-inputs">
                    <input type="text" class="item-name-input" placeholder="Название" value="${name}">
                    <input type="text" class="resistance-input" placeholder="Сопротивление (Ом)" value="${resistance}">
                </div>
                <input type="number" class="volume-input" placeholder="Объем (мл)" value="${volume}" min="0" step="1">
                <label class="item-stock-checkbox">
                    <input type="checkbox" class="item-instock" ${itemInStock ? 'checked' : ''}>
                    <span class="checkbox-custom"></span>
                    <span class="checkbox-label">В наличии</span>
                </label>
            `;
            
            container.appendChild(row);
        }

        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const fileName = document.getElementById('fileName');
            const imagePreview = document.getElementById('imagePreview');
            
            if (file) {
                fileName.textContent = file.name;
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.classList.remove('placeholder');
                };
                reader.readAsDataURL(file);
            } else {
                fileName.textContent = 'Файл не выбран';
                imagePreview.src = '';
                imagePreview.classList.add('placeholder');
            }
        });

        document.getElementById('saveBtn').addEventListener('click', async function() {
            const productName = document.getElementById('productName').value.trim();
            const productPrice = parseFloat(document.getElementById('productPrice').value);
            const isNew = document.getElementById('isNew').checked;
            const inStock = document.getElementById('inStock').checked;
            const imagePreview = document.getElementById('imagePreview').src;
            
            if (!productName) {
                alert('Введите название товара');
                return;
            }
            
            if (!productPrice || productPrice <= 0) {
                alert('Введите корректную цену');
                return;
            }

            const itemRows = document.querySelectorAll('#itemsContainer .item-row');
            const items = [];
            let hasValidItem = false;

            itemRows.forEach(row => {
                const nameInput = row.querySelector('.item-name-input');
                const resistanceInput = row.querySelector('.resistance-input');
                const volumeInput = row.querySelector('.volume-input');
                const inStockCheckbox = row.querySelector('.item-instock');
                
                const name = nameInput ? nameInput.value.trim() : '';
                const resistance = resistanceInput ? resistanceInput.value.trim() : '';
                const volume = volumeInput ? volumeInput.value.trim() : '';
                const itemInStock = inStockCheckbox ? inStockCheckbox.checked : true;
                
                if (name) {
                    hasValidItem = true;
                    items.push({
                        name: name,
                        resistance: resistance || '—',
                        volume: volume || '',
                        inStock: itemInStock,
                        quantity: 0
                    });
                }
            });

            if (!hasValidItem) {
                alert('Добавьте хотя бы одну модификацию');
                return;
            }

            const product = {
                name: productName,
                price: productPrice,
                isNew: isNew,
                inStock: inStock,
                image: imagePreview && !imagePreview.includes('placeholder') ? imagePreview : '',
                items: items
            };

            if (editingIndex >= 0) {
                products[editingIndex] = product;
            } else {
                products.push(product);
            }

            await saveProducts();
            
            document.getElementById('productModal').classList.remove('show');
            displayProducts();
        });

        document.getElementById('deleteBtn').addEventListener('click', async function() {
            if (editingIndex >= 0 && confirm('Удалить этот товар?')) {
                products.splice(editingIndex, 1);
                await saveProducts();
                document.getElementById('productModal').classList.remove('show');
                displayProducts();
            }
        });

        document.getElementById('addItemBtn').addEventListener('click', () => addItemRow());

        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('productModal').classList.remove('show');
        });

        document.getElementById('productModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('productModal')) {
                e.target.classList.remove('show');
            }
        });

        function subscribeToUpdates() {
            FirestoreService.subscribeToCollection(COLLECTION_NAME, (updatedProducts) => {
                products = updatedProducts;
                displayProducts();
            });
        }

        async function init() {
            await loadProducts();
            subscribeToUpdates();
        }

        init();
    </script>
</body>
</html>
