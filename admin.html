<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAPEOPT | АВТОРИЗАЦИЯ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', 'Arial', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        body {
            background: #03050f;
            background-image: radial-gradient(ellipse at 50% 30%, #1b2b55 0%, #020412 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .ship-hud {
            width: 100%;
            max-width: 500px;
            height: 95vh;
            max-height: 900px;
            background: rgba(2, 10, 22, 0.8);
            backdrop-filter: blur(12px);
            border: 3px solid #3e7bff;
            border-radius: 50px;
            box-shadow: 0 0 60px #1e4fcf, 0 0 30px #3e7bff inset;
            padding: 30px 22px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Эффект сканирования */
        .ship-hud::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 10px;
            background: linear-gradient(90deg, transparent, #3e7bff, transparent);
            animation: scanLine 4s linear infinite;
            opacity: 0.5;
        }

        @keyframes scanLine {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* Голографические круги */
        .hologram-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border: 2px dashed #3e7bff30;
            border-radius: 50%;
            pointer-events: none;
            animation: rotateRing 20s linear infinite;
        }

        .hologram-ring2 {
            width: 300px;
            height: 300px;
            border: 1px solid #3e7bff20;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotateRingReverse 15s linear infinite;
        }

        @keyframes rotateRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes rotateRingReverse {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(-360deg); }
        }

        /* Шапка */
        .ship-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            position: relative;
            z-index: 2;
        }

        .ship-title {
            display: flex;
            flex-direction: column;
        }

        .ship-name {
            font-size: 3.5rem;
            font-weight: 900;
            color: #8fb8ff;
            text-shadow: 0 0 20px #3e7bff, 0 0 40px #1e4fcf;
            letter-spacing: 4px;
            line-height: 1;
            animation: glowPulse 3s ease-in-out infinite;
        }

        .ship-sub {
            font-size: 1rem;
            color: #afc9ff;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 20px #3e7bff, 0 0 40px #1e4fcf; }
            50% { text-shadow: 0 0 30px #5f9eff, 0 0 60px #2f6fdf; }
        }

        .back-link {
            background: #10213f;
            border: 2px solid #3e7bff;
            color: #8fb8ff;
            width: 55px;
            height: 55px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            text-decoration: none;
            box-shadow: 0 0 30px #3e7bff;
            transition: 0.2s;
        }

        .back-link:hover {
            background: #3e7bff;
            color: black;
            transform: scale(1.1) rotate(-15deg);
            box-shadow: 0 0 30px #3e7bff;
        }

        /* Форма авторизации */
        .auth-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
            gap: 30px;
        }

        .auth-title {
            font-size: 2rem;
            color: #8fb8ff;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 15px #3e7bff;
            border-bottom: 2px solid #3e7bff;
            padding-bottom: 10px;
        }

        .auth-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            color: #afc9ff;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-left: 10px;
        }

        .input-group input {
            background: rgba(8, 20, 40, 0.7);
            border: 2px solid #3e7bff;
            border-radius: 30px;
            padding: 15px 20px;
            font-size: 1rem;
            color: #8fb8ff;
            font-family: 'Orbitron', sans-serif;
            outline: none;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(62, 123, 255, 0.3);
        }

        .input-group input:focus {
            border-color: #8fb8ff;
            box-shadow: 0 0 30px #3e7bff;
            background: rgba(12, 30, 60, 0.8);
        }

        .input-group input::placeholder {
            color: #3e5a80;
            letter-spacing: 1px;
        }

        .auth-button {
            background: #10213f;
            border: 3px solid #3e7bff;
            color: #8fb8ff;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 30px #3e7bff;
        }

        .auth-button:hover {
            background: #3e7bff;
            color: black;
            transform: translateY(-3px);
            box-shadow: 0 0 50px #3e7bff;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.9rem;
            text-align: center;
            min-height: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #e74c3c;
        }

        /* Нижний дисплей со стрелками */
        .ship-display {
            margin-top: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: #8fb8ff;
            letter-spacing: 2px;
            border-top: 2px solid #3e7bff;
            padding-top: 12px;
            position: relative;
            z-index: 2;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            white-space: nowrap;
        }

        .ship-display span {
            animation: flicker 2s infinite;
        }

        .arrow-down {
            font-size: 1.2rem;
            color: #3e7bff;
            animation: arrowBounce 1s ease-in-out infinite;
            display: inline-block;
            filter: drop-shadow(0 0 8px #3e7bff);
            transform: rotate(180deg);
        }

        .arrow-left {
            animation: arrowLeftBounce 1s ease-in-out infinite;
        }

        .arrow-right {
            animation: arrowRightBounce 1s ease-in-out infinite;
        }

        @keyframes arrowBounce {
            0%, 100% { transform: rotate(180deg) translateY(0); }
            50% { transform: rotate(180deg) translateY(-5px); }
        }

        @keyframes arrowLeftBounce {
            0%, 100% { transform: rotate(180deg) translateX(0) translateY(0); }
            50% { transform: rotate(180deg) translateX(-3px) translateY(-5px); }
        }

        @keyframes arrowRightBounce {
            0%, 100% { transform: rotate(180deg) translateX(0) translateY(0); }
            50% { transform: rotate(180deg) translateX(3px) translateY(-5px); }
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @media (max-width: 400px) {
            .ship-name { font-size: 2.8rem; }
            .auth-title { font-size: 1.5rem; }
            .input-group input { padding: 12px 15px; }
            .ship-display { font-size: 0.7rem; gap: 5px; }
            .arrow-down { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="ship-hud">
        <div class="hologram-ring"></div>
        <div class="hologram-ring2"></div>

        <div class="ship-header">
            <div class="ship-title">
                <div class="ship-name">VAPEOPT</div>
                <div class="ship-sub">АВТОРИЗАЦИЯ</div>
            </div>
            <a href="index.html" class="back-link" title="На главную">⏎</a>
        </div>

        <div class="auth-container">
            <div class="auth-title">ДОСТУП К ПАНЕЛИ</div>
            
            <div class="auth-form">
                <div class="input-group">
                    <label>🔐 ЛОГИН</label>
                    <input type="text" id="login" placeholder="Введите логин" autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label>⚡ ПАРОЛЬ</label>
                    <input type="password" id="password" placeholder="Введите пароль">
                </div>

                <div class="error-message" id="errorMessage"></div>

                <button class="auth-button" id="loginBtn">ВОЙТИ</button>
            </div>
        </div>

        <div class="ship-display">
            <span class="arrow-down arrow-left">▲</span>
            <span>ТОЛЬКО ДЛЯ АДМИНИСТРАТОРА</span>
            <span class="arrow-down arrow-right">▲</span>
        </div>
    </div>

    <script>
        // Функция для простого хеширования (чтобы не хранить пароль в открытом виде)
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            // Преобразуем в положительное число и добавляем соль для надежности
            return Math.abs(hash).toString(16) + 'salt';
        }

        // Хеши для логина и пароля (с дополнительной солью)
        const LOGIN_HASH = simpleHash('DsAyu1718'); // Будет что-то вроде "1a7b3f5dsalt"
        const PASSWORD_HASH = simpleHash('g@k72%x0htBaTla'); // Будет что-то вроде "c8e9f4b2salt"

        // Функция для проверки учетных данных
        function checkCredentials(login, password) {
            try {
                const loginHash = simpleHash(login);
                const passwordHash = simpleHash(password);
                
                return loginHash === LOGIN_HASH && passwordHash === PASSWORD_HASH;
            } catch (e) {
                console.error('Ошибка проверки:', e);
                return false;
            }
        }

        document.getElementById('loginBtn').addEventListener('click', function(e) {
            e.preventDefault();
            
            const login = document.getElementById('login').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            if (!login || !password) {
                errorMessage.textContent = 'ЗАПОЛНИТЕ ВСЕ ПОЛЯ';
                return;
            }

            if (checkCredentials(login, password)) {
                // Успешный вход - перенаправляем в админ-панель
                window.location.href = 'admin-panel.html';
            } else {
                errorMessage.textContent = 'ОШИБКА ДОСТУПА';
                errorMessage.style.animation = 'glowPulse 1s';
                setTimeout(() => {
                    errorMessage.style.animation = '';
                }, 1000);
                
                // Очищаем поля для безопасности
                document.getElementById('login').value = '';
                document.getElementById('password').value = '';
                document.getElementById('login').focus();
            }
        });

        // Обработка нажатия Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('loginBtn').click();
            }
        });

        // Добавляем обработчик для формы, чтобы предотвратить отправку
        document.querySelector('.auth-form').addEventListener('submit', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
