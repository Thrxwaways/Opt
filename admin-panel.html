<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAPEOPT | АДМИН-ПАНЕЛЬ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            font-family: 'Montserrat', 'Orbitron', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap');

        body {
            background: #03050f;
            background-image: radial-gradient(ellipse at 50% 30%, #1b2b55 0%, #020412 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }

        a:focus, button:focus, div:focus, .cargo-module:focus {
            outline: none !important;
            box-shadow: none !important;
        }

        .ship-hud {
            width: 100%;
            max-width: 500px;
            height: 95vh;
            max-height: 900px;
            background: rgba(2, 10, 22, 0.8);
            backdrop-filter: blur(12px);
            border: 3px solid #3e7bff;
            border-radius: 50px;
            box-shadow: 0 0 60px #1e4fcf, 0 0 30px #3e7bff inset;
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .ship-hud::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 10px;
            background: linear-gradient(90deg, transparent, #3e7bff, transparent);
            animation: scanLine 4s linear infinite;
            opacity: 0.5;
        }

        @keyframes scanLine {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .hologram-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border: 2px dashed #3e7bff30;
            border-radius: 50%;
            pointer-events: none;
            animation: rotateRing 20s linear infinite;
        }

        .hologram-ring2 {
            width: 300px;
            height: 300px;
            border: 1px solid #3e7bff20;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotateRingReverse 15s linear infinite;
        }

        @keyframes rotateRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes rotateRingReverse {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(-360deg); }
        }

        .ship-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
            z-index: 2;
        }

        .ship-title {
            display: flex;
            flex-direction: column;
        }

        .ship-name {
            font-size: 1.8rem;
            font-weight: 900;
            color: #8fb8ff;
            text-shadow: 0 0 20px #3e7bff, 0 0 40px #1e4fcf;
            letter-spacing: 3px;
            line-height: 1;
            font-family: 'Orbitron', sans-serif;
            animation: glowPulse 3s ease-in-out infinite;
        }

        .ship-sub {
            font-size: 0.65rem;
            color: #afc9ff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 20px #3e7bff, 0 0 40px #1e4fcf; }
            50% { text-shadow: 0 0 30px #5f9eff, 0 0 60px #2f6fdf; }
        }

        .header-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .control-btn, .logout-btn {
            background: #10213f;
            border: 2px solid #3e7bff;
            color: #8fb8ff;
            width: 38px;
            height: 38px;
            border-radius: 19px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            text-decoration: none;
            box-shadow: 0 0 15px #3e7bff;
            transition: 0.2s;
            cursor: pointer;
        }

        .control-btn:hover, .logout-btn:hover {
            background: #3e7bff;
            color: black;
            transform: scale(1.1);
        }

        .logout-btn {
            background: #e74c3c;
            border: 2px solid #e74c3c;
            box-shadow: 0 0 15px #e74c3c;
        }

        .logout-btn:hover {
            background: #c0392b;
            border-color: #c0392b;
        }

        .ship-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            flex: 1;
            align-content: start;
            padding-top: 5px;
            position: relative;
            z-index: 2;
            overflow-y: auto;
            min-height: 0;
            padding-bottom: 10px;
        }

        .cargo-module {
            background: rgba(8, 20, 40, 0.7);
            backdrop-filter: blur(5px);
            border: 3px solid #3e7bff;
            border-radius: 30px;
            padding: 18px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 15px 30px -12px black, 0 0 0 2px #8fb8ff inset;
            aspect-ratio: 1/1;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .last-row {
            grid-column: span 2;
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 0;
            width: 100%;
        }

        .last-row .cargo-module {
            width: calc(50% - 7px);
        }

        .cargo-module:hover {
            transform: translateY(-5px);
            border-color: #8fb8ff;
            box-shadow: 0 0 40px #3e7bff, 0 0 20px #8fb8ff inset;
        }

        .cargo-module::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(90deg, 
                    transparent, 
                    transparent 10px,
                    rgba(62, 123, 255, 0.1) 10px,
                    rgba(62, 123, 255, 0.1) 12px
                ),
                repeating-linear-gradient(0deg, 
                    transparent, 
                    transparent 10px,
                    rgba(62, 123, 255, 0.1) 10px,
                    rgba(62, 123, 255, 0.1) 12px
                );
            border-radius: 28px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            animation: electricity 0.5s steps(2) infinite;
        }

        .cargo-module:hover::after {
            opacity: 0.8;
        }

        @keyframes electricity {
            0% { background-position: 0 0; }
            100% { background-position: 20px 20px; }
        }

        .cargo-icon-img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 10px #3e7bff);
            animation: iconFloat 3s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        /* Увеличенная иконка для расходников */
        .cargo-icon-img.special-icon {
            width: 100px; /* Увеличено в 1.5 раза */
            height: 100px; /* Увеличено в 1.5 раза */
            margin-bottom: -5px; /* Уменьшено с 8px до 5px */
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .cargo-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: #cfdfff;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: textGlow 2s ease-in-out infinite;
            text-align: center;
            margin-bottom: 5px;
        }

        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 5px #8fb8ff; }
            50% { text-shadow: 0 0 15px #8fb8ff; }
        }

        .stock-status {
            font-size: 0.7rem;
            padding: 3px 12px;
            border-radius: 20px;
            margin-top: 4px;
            border: 1px solid;
            animation: dataPulse 2s ease-in-out infinite;
            width: fit-content;
        }

        .stock-status.in-stock {
            background: #0a2a1a;
            border-color: #2ecc71;
            color: #a0e0a0;
            text-shadow: 0 0 5px #2ecc71;
        }

        .stock-status.out-of-stock {
            background: #2a1a1a;
            border-color: #e74c3c;
            color: #f0a0a0;
            text-shadow: 0 0 5px #e74c3c;
        }

        @keyframes dataPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .orders-button {
            margin-top: 15px;
            border-top: 2px solid #3e7bff;
            padding-top: 12px;
            flex-shrink: 0;
        }

        .orders-btn {
            width: 100%;
            background: #10213f;
            border: 3px solid #3e7bff;
            color: #8fb8ff;
            padding: 12px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 35px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 20px #3e7bff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .orders-btn:hover {
            background: #3e7bff;
            color: black;
            transform: translateY(-2px);
            box-shadow: 0 0 30px #3e7bff;
        }

        .orders-btn .order-count {
            background: #e74c3c;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-left: 5px;
            box-shadow: 0 0 10px #e74c3c;
        }

        .bottom-panel {
            margin-top: 12px;
            text-align: center;
            font-size: 0.75rem;
            color: #8fb8ff;
            letter-spacing: 1px;
            border-top: 2px solid #3e7bff;
            padding-top: 10px;
            position: relative;
            z-index: 2;
            font-family: 'Montserrat', sans-serif;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bottom-email {
            background: rgba(8, 20, 40, 0.5);
            border: 1px solid #3e7bff;
            border-radius: 30px;
            padding: 5px 15px;
            color: #8fb8ff;
            font-size: 0.7rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
            box-shadow: 0 0 10px #3e7bff;
        }

        .orders-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(2, 10, 22, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .orders-modal.show {
            display: flex;
        }

        .orders-modal-content {
            width: 90%;
            max-width: 500px;
            height: 85vh;
            background: rgba(8, 20, 40, 0.95);
            border: 3px solid #3e7bff;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 0 50px #3e7bff;
            display: flex;
            flex-direction: column;
        }

        .orders-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #3e7bff;
        }

        .orders-modal-header h2 {
            color: #8fb8ff;
            font-size: 1.3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .close-orders-modal {
            background: none;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            width: 35px;
            height: 35px;
            border-radius: 18px;
            font-size: 1.3rem;
            cursor: pointer;
        }

        .orders-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .orders-tab {
            flex: 1;
            background: #10213f;
            border: 2px solid #3e7bff;
            border-radius: 30px;
            padding: 10px 0;
            text-align: center;
            color: #8fb8ff;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        .orders-tab.active {
            background: #3e7bff;
            color: black;
        }

        .orders-scroll-area {
            flex: 1;
            overflow-y: auto;
        }

        .orders-grid {
            display: grid;
            gap: 15px;
        }

        .order-card {
            background: rgba(8, 20, 40, 0.7);
            border: 2px solid #3e7bff;
            border-radius: 25px;
            padding: 15px;
        }

        .order-card.pending {
            border-left: 6px solid #f39c12;
        }

        .order-card.completed {
            border-left: 6px solid #2ecc71;
        }

        .empty-orders {
            text-align: center;
            color: #8fb8ff;
            padding: 30px 20px;
            border: 2px dashed #3e7bff;
            border-radius: 30px;
            background: rgba(8, 20, 40, 0.5);
            font-size: 0.9rem;
        }

        @media (max-width: 400px) {
            .ship-name { font-size: 1.6rem; }
            .cargo-icon-img { width: 40px; height: 40px; }
            .cargo-icon-img.special-icon { width: 60px; height: 60px; } /* Адаптация для мобильных */
            .cargo-name { font-size: 0.8rem; }
            .stock-status { font-size: 0.65rem; }
            .bottom-email { max-width: 200px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>

    <div class="ship-hud">
        <div class="hologram-ring"></div>
        <div class="hologram-ring2"></div>

        <div class="ship-header">
            <div class="ship-title">
                <div class="ship-name">VAPEOPT</div>
                <div class="ship-sub">АДМИН-ПАНЕЛЬ</div>
            </div>
            <div class="header-controls">
                <a href="index.html" class="control-btn" title="На главную">🏠</a>
                <button class="logout-btn" id="logoutBtn" title="Выйти">🚪</button>
            </div>
        </div>

        <div class="ship-grid" id="shipGrid"></div>

        <div class="orders-button">
            <button class="orders-btn" id="showOrdersBtn">
                📋 ЗАКАЗЫ
                <span class="order-count" id="pendingOrdersCount">0</span>
            </button>
        </div>

        <div class="bottom-panel">
            <div class="bottom-email" id="currentUserEmail">Загрузка...</div>
        </div>
    </div>

    <div class="orders-modal" id="ordersModal">
        <div class="orders-modal-content">
            <div class="orders-modal-header">
                <h2>📋 УПРАВЛЕНИЕ ЗАКАЗАМИ</h2>
                <button class="close-orders-modal" id="closeOrdersModal">✕</button>
            </div>

            <div class="orders-tabs">
                <div class="orders-tab active" onclick="switchOrdersTab('pending')" id="tabPending">🕒 НЕВЫПОЛНЕННЫЕ</div>
                <div class="orders-tab" onclick="switchOrdersTab('completed')" id="tabCompleted">✅ ВЫПОЛНЕННЫЕ</div>
            </div>

            <div class="orders-scroll-area">
                <div class="orders-grid" id="ordersGrid"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let currentTab = 'pending';
        let allOrders = [];
        let sectionsData = [];
        let isUpdating = false;

        // ==================== ЗАГЛУШКА ДЛЯ ТЕСТА ====================
        const mockSections = [
            { name: 'Жидкости', icon: 'https://i.ibb.co/84bSpmp5/liquid-icon.png', inStock: 3, outOfStock: 0, link: 'zhidk-admin.html' },
            { name: 'Расходники', icon: 'https://i.ibb.co/nNwbtCP0/consumable-icon.png', inStock: 2, outOfStock: 1, link: 'rashod-admin.html' },
            { name: 'POD', icon: 'https://i.ibb.co/zhhLJNj7/pod-icon.png', inStock: 4, outOfStock: 0, link: 'pod-admin.html' },
            { name: 'Одноразки', icon: 'https://i.ibb.co/H1Yh7DJ/disposable-icon.png', inStock: 5, outOfStock: 2, link: 'odnoraz-admin.html' },
            { name: 'Снюс', icon: 'https://i.ibb.co/wNRFkvZZ/snus-icon.png', inStock: 1, outOfStock: 3, link: 'snus-admin.html' }
        ];

        // ==================== ФУНКЦИИ ДЛЯ РАЗДЕЛОВ ТОВАРОВ ====================
        async function getSectionsData() {
            try {
                if (typeof FirestoreService === 'undefined' || !FirestoreService.getCollection) {
                    console.log('FirestoreService не доступен, используем заглушку');
                    return mockSections;
                }

                const [liquids, consumables, pod, disposables, snus] = await Promise.all([
                    FirestoreService.getCollection('liquids').catch(() => []),
                    FirestoreService.getCollection('consumables').catch(() => []),
                    FirestoreService.getCollection('pod').catch(() => []),
                    FirestoreService.getCollection('disposables').catch(() => []),
                    FirestoreService.getCollection('snus').catch(() => [])
                ]);
                
                if (!liquids.length && !consumables.length && !pod.length && !disposables.length && !snus.length) {
                    return mockSections;
                }
                
                const liquidsInStock = liquids.filter(l => l.flavors?.some(f => f.inStock !== false)).length;
                const liquidsOutOfStock = liquids.filter(l => !l.flavors?.some(f => f.inStock !== false)).length;
                
                const consumablesInStock = consumables.filter(c => c.items?.some(item => item.inStock !== false)).length;
                const consumablesOutOfStock = consumables.filter(c => !c.items?.some(item => item.inStock !== false)).length;
                
                const podInStock = pod.filter(p => p.items?.some(item => item.inStock !== false)).length;
                const podOutOfStock = pod.filter(p => !p.items?.some(item => item.inStock !== false)).length;
                
                const disposablesInStock = disposables.filter(d => d.items?.some(item => item.inStock !== false)).length;
                const disposablesOutOfStock = disposables.filter(d => !d.items?.some(item => item.inStock !== false)).length;
                
                const snusInStock = snus.filter(s => s.items?.some(item => item.inStock !== false)).length;
                const snusOutOfStock = snus.filter(s => !s.items?.some(item => item.inStock !== false)).length;
                
                return [
                    { name: 'Жидкости', icon: 'https://i.ibb.co/84bSpmp5/liquid-icon.png', inStock: liquidsInStock, outOfStock: liquidsOutOfStock, link: 'zhidk-admin.html' },
                    { name: 'Расходники', icon: 'https://i.ibb.co/nNwbtCP0/consumable-icon.png', inStock: consumablesInStock, outOfStock: consumablesOutOfStock, link: 'rashod-admin.html' },
                    { name: 'POD', icon: 'https://i.ibb.co/zhhLJNj7/pod-icon.png', inStock: podInStock, outOfStock: podOutOfStock, link: 'pod-admin.html' },
                    { name: 'Одноразки', icon: 'https://i.ibb.co/H1Yh7DJ/disposable-icon.png', inStock: disposablesInStock, outOfStock: disposablesOutOfStock, link: 'odnoraz-admin.html' },
                    { name: 'Снюс', icon: 'https://i.ibb.co/wNRFkvZZ/snus-icon.png', inStock: snusInStock, outOfStock: snusOutOfStock, link: 'snus-admin.html' }
                ];
            } catch (error) {
                console.error('Ошибка получения данных:', error);
                return mockSections;
            }
        }

        function createModule(section) {
            const module = document.createElement('div');
            module.className = 'cargo-module';
            
            const stockClass = section.inStock > 0 ? 'in-stock' : 'out-of-stock';
            const stockText = section.inStock > 0 ? `в наличии: ${section.inStock}` : `нет в наличии: ${section.outOfStock}`;
            
            // Добавляем специальный класс для иконки расходников
            const iconClass = section.name === 'Расходники' ? 'cargo-icon-img special-icon' : 'cargo-icon-img';

            module.innerHTML = `
                <img src="${section.icon}" class="${iconClass}" alt="${section.name}" onerror="this.src='https://via.placeholder.com/50x50/10213f/3e7bff?text=${section.name[0]}'">
                <span class="cargo-name">${section.name}</span>
                <span class="stock-status ${stockClass}">${stockText}</span>
            `;

            module.addEventListener('click', () => window.location.href = section.link);
            return module;
        }

        async function updateDisplay() {
            if (isUpdating) return;
            isUpdating = true;
            
            const grid = document.getElementById('shipGrid');
            if (!grid) {
                isUpdating = false;
                return;
            }
            
            try {
                grid.innerHTML = '';
                
                sectionsData = await getSectionsData();
                if (!sectionsData || sectionsData.length === 0) {
                    isUpdating = false;
                    return;
                }
                
                for (let i = 0; i < 4; i++) {
                    grid.appendChild(createModule(sectionsData[i]));
                }
                
                const lastRow = document.createElement('div');
                lastRow.className = 'last-row';
                lastRow.appendChild(createModule(sectionsData[4]));
                
                const emptyModule = document.createElement('div');
                emptyModule.style.visibility = 'hidden';
                emptyModule.style.pointerEvents = 'none';
                emptyModule.className = 'cargo-module';
                emptyModule.style.background = 'transparent';
                emptyModule.style.border = 'none';
                emptyModule.style.boxShadow = 'none';
                lastRow.appendChild(emptyModule);
                
                grid.appendChild(lastRow);
            } finally {
                isUpdating = false;
            }
        }

        // ==================== ФУНКЦИИ ДЛЯ ЗАКАЗОВ ====================
        async function loadOrders() {
            try {
                if (typeof FirestoreService !== 'undefined') {
                    allOrders = await FirestoreService.getCollection('orders') || [];
                } else {
                    allOrders = [];
                }
                updateOrdersDisplay();
            } catch (error) {
                console.error('Ошибка загрузки заказов:', error);
                allOrders = [];
                updateOrdersDisplay();
            }
        }

        function updateOrdersDisplay() {
            const pendingCount = allOrders.filter(o => o.status === 'pending').length;
            document.getElementById('pendingOrdersCount').textContent = pendingCount;
            filterOrdersByTab();
        }

        function filterOrdersByTab() {
            const orders = allOrders.filter(o => o.status === currentTab);
            const ordersGrid = document.getElementById('ordersGrid');
            
            if (orders.length === 0) {
                ordersGrid.innerHTML = `<div class="empty-orders">НЕТ ${currentTab === 'pending' ? 'НЕВЫПОЛНЕННЫХ' : 'ВЫПОЛНЕННЫХ'} ЗАКАЗОВ</div>`;
                return;
            }

            let html = '';
            orders.forEach(order => {
                html += `
                    <div class="order-card ${order.status}">
                        <div class="order-header">
                            <span class="order-number">${order.orderId || 'Заказ'}</span>
                            <span class="order-date">${new Date(order.createdAt).toLocaleDateString()}</span>
                        </div>
                        <div class="order-customer">
                            <span>${order.customer?.telegram || '@username'}</span>
                            <span>${order.customer?.name || 'Имя'}</span>
                        </div>
                        <div class="order-footer">
                            <span>ИТОГО: ${order.totalPrice || 0} BYN</span>
                        </div>
                    </div>
                `;
            });
            ordersGrid.innerHTML = html;
        }

        window.switchOrdersTab = function(tab) {
            currentTab = tab;
            document.getElementById('tabPending').classList.remove('active');
            document.getElementById('tabCompleted').classList.remove('active');
            document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
            filterOrdersByTab();
        };

        // ==================== УПРАВЛЕНИЕ МОДАЛЬНЫМ ОКНОМ ====================
        function initModal() {
            const modal = document.getElementById('ordersModal');
            const showBtn = document.getElementById('showOrdersBtn');
            const closeBtn = document.getElementById('closeOrdersModal');

            showBtn.addEventListener('click', () => {
                modal.classList.add('show');
            });

            closeBtn.addEventListener('click', () => {
                modal.classList.remove('show');
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('show');
                }
            });
        }

        // ==================== ПОДПИСКИ НА ОБНОВЛЕНИЯ ====================
        function subscribeToUpdates() {
            if (typeof FirestoreService !== 'undefined') {
                FirestoreService.subscribeToCollection('liquids', updateDisplay);
                FirestoreService.subscribeToCollection('consumables', updateDisplay);
                FirestoreService.subscribeToCollection('pod', updateDisplay);
                FirestoreService.subscribeToCollection('disposables', updateDisplay);
                FirestoreService.subscribeToCollection('snus', updateDisplay);
                
                FirestoreService.subscribeToCollection('orders', (updatedOrders) => {
                    allOrders = updatedOrders;
                    updateOrdersDisplay();
                });
            }
        }

        // ==================== АВТОРИЗАЦИЯ ====================
        function setupAuth() {
            const userEmailSpan = document.getElementById('currentUserEmail');
            if (typeof auth !== 'undefined') {
                auth.onAuthStateChanged(user => {
                    if (user) {
                        userEmailSpan.textContent = user.email;
                    } else {
                        userEmailSpan.textContent = 'Не авторизован';
                    }
                });
            }

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                if (typeof auth !== 'undefined') {
                    await auth.signOut();
                    window.location.href = 'login.html';
                }
            });
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        async function init() {
            await updateDisplay();
            await loadOrders();
            subscribeToUpdates();
            initModal();
            setupAuth();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
