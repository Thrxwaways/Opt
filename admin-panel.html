<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAPEOPT | АДМИН-ПАНЕЛЬ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            font-family: 'Montserrat', 'Orbitron', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap');

        body {
            background: #03050f;
            background-image: radial-gradient(ellipse at 50% 30%, #1b2b55 0%, #020412 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        a:focus,
        button:focus,
        div:focus,
        .cargo-module:focus,
        .control-btn:focus,
        .order-card:focus {
            outline: none !important;
            box-shadow: none !important;
        }

        :focus {
            outline: none !important;
        }

        ::-moz-focus-inner {
            border: 0;
        }

        .ship-hud {
            width: 100%;
            max-width: 500px;
            height: 95vh;
            max-height: 900px;
            background: rgba(2, 10, 22, 0.8);
            backdrop-filter: blur(12px);
            border: 3px solid #3e7bff;
            border-radius: 50px;
            box-shadow: 0 0 60px #1e4fcf, 0 0 30px #3e7bff inset;
            padding: 30px 22px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .ship-hud::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 10px;
            background: linear-gradient(90deg, transparent, #3e7bff, transparent);
            animation: scanLine 4s linear infinite;
            opacity: 0.5;
        }

        @keyframes scanLine {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .hologram-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border: 2px dashed #3e7bff30;
            border-radius: 50%;
            pointer-events: none;
            animation: rotateRing 20s linear infinite;
        }

        .hologram-ring2 {
            width: 300px;
            height: 300px;
            border: 1px solid #3e7bff20;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotateRingReverse 15s linear infinite;
        }

        @keyframes rotateRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes rotateRingReverse {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(-360deg); }
        }

        .ship-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }

        .ship-title {
            display: flex;
            flex-direction: column;
        }

        .ship-name {
            font-size: 2rem;
            font-weight: 900;
            color: #8fb8ff;
            text-shadow: 0 0 20px #3e7bff, 0 0 40px #1e4fcf;
            letter-spacing: 3px;
            line-height: 1;
            font-family: 'Orbitron', sans-serif;
            animation: glowPulse 3s ease-in-out infinite;
        }

        .ship-sub {
            font-size: 0.7rem;
            color: #afc9ff;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 20px #3e7bff, 0 0 40px #1e4fcf; }
            50% { text-shadow: 0 0 30px #5f9eff, 0 0 60px #2f6fdf; }
        }

        .header-controls {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            background: #10213f;
            border: 2px solid #3e7bff;
            color: #8fb8ff;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            text-decoration: none;
            box-shadow: 0 0 15px #3e7bff;
            transition: 0.2s;
        }

        .control-btn:hover {
            background: #3e7bff;
            color: black;
            transform: scale(1.1);
        }

        .ship-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            flex: 1;
            align-content: start;
            padding-top: 10px;
            position: relative;
            z-index: 2;
        }

        .cargo-module {
            background: rgba(8, 20, 40, 0.7);
            backdrop-filter: blur(5px);
            border: 3px solid #3e7bff;
            border-radius: 25px;
            padding: 12px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 15px 30px -12px black, 0 0 0 2px #8fb8ff inset;
            aspect-ratio: 1/1;
            position: relative;
            overflow: hidden;
        }

        .last-row {
            grid-column: span 2;
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 0;
        }

        .last-row .cargo-module {
            width: calc(50% - 6px);
            margin: 0;
        }

        .cargo-module:hover {
            transform: translateY(-3px);
            border-color: #8fb8ff;
            box-shadow: 0 0 30px #3e7bff, 0 0 15px #8fb8ff inset;
        }

        .cargo-icon {
            font-size: 2rem;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 8px #3e7bff);
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .cargo-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: #cfdfff;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.2;
            margin-bottom: 5px;
            font-family: 'Montserrat', sans-serif;
        }

        .stock-status {
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 12px;
            margin-top: 3px;
            border: 1px solid;
            transition: all 0.3s ease;
            width: fit-content;
            font-family: 'Montserrat', sans-serif;
        }

        .stock-status.in-stock {
            background: #0a2a1a;
            border-color: #2ecc71;
            color: #a0e0a0;
            text-shadow: 0 0 5px #2ecc71;
        }

        .stock-status.out-of-stock {
            background: #2a1a1a;
            border-color: #e74c3c;
            color: #f0a0a0;
            text-shadow: 0 0 5px #e74c3c;
        }

        /* Кнопка заказов внизу */
        .orders-button {
            margin-top: 15px;
            border-top: 2px solid #3e7bff;
            padding-top: 15px;
            position: relative;
            z-index: 2;
        }

        .orders-btn {
            width: 100%;
            background: #10213f;
            border: 3px solid #3e7bff;
            color: #8fb8ff;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 20px #3e7bff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .orders-btn:hover {
            background: #3e7bff;
            color: black;
            transform: translateY(-2px);
            box-shadow: 0 0 30px #3e7bff;
        }

        .orders-btn .order-count {
            background: #e74c3c;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-left: 5px;
            box-shadow: 0 0 10px #e74c3c;
        }

        /* Модальное окно заказов */
        .orders-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(2, 10, 22, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .orders-modal.show {
            display: flex;
        }

        .orders-modal-content {
            width: 90%;
            max-width: 500px;
            height: 85vh;
            background: rgba(8, 20, 40, 0.95);
            border: 3px solid #3e7bff;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 0 50px #3e7bff;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .orders-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #3e7bff;
        }

        .orders-modal-header h2 {
            color: #8fb8ff;
            font-size: 1.3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .close-orders-modal {
            background: none;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            width: 35px;
            height: 35px;
            border-radius: 18px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-orders-modal:hover {
            background: #e74c3c;
            color: black;
        }

        .orders-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .orders-tab {
            flex: 1;
            background: #10213f;
            border: 2px solid #3e7bff;
            border-radius: 30px;
            padding: 10px 0;
            text-align: center;
            color: #8fb8ff;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
        }

        .orders-tab.active {
            background: #3e7bff;
            color: black;
            border-color: #8fb8ff;
            box-shadow: 0 0 20px #3e7bff;
        }

        .orders-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .orders-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .order-card {
            background: rgba(8, 20, 40, 0.7);
            border: 2px solid #3e7bff;
            border-radius: 25px;
            padding: 15px;
            transition: 0.2s;
        }

        .order-card.pending {
            border-left: 6px solid #f39c12;
        }

        .order-card.completed {
            border-left: 6px solid #2ecc71;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #3e7bff40;
        }

        .order-number {
            font-size: 1.1rem;
            font-weight: 700;
            color: #8fb8ff;
            text-shadow: 0 0 10px #3e7bff;
        }

        .order-date {
            font-size: 0.7rem;
            color: #a0aec0;
        }

        .order-customer {
            background: rgba(8, 20, 40, 0.5);
            border: 1px solid #3e7bff;
            border-radius: 15px;
            padding: 8px 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .customer-telegram {
            color: #8fb8ff;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .customer-name {
            color: #cfdfff;
            font-size: 0.8rem;
        }

        .order-items-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .order-mini-item {
            background: rgba(8, 20, 40, 0.5);
            border: 1px solid #3e7bff40;
            border-radius: 12px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .order-mini-item-name {
            font-size: 0.7rem;
            color: #cfdfff;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .order-mini-item-details {
            font-size: 0.6rem;
            color: #8fb8ff;
        }

        .order-mini-item-price {
            font-size: 0.65rem;
            color: #2ecc71;
            margin-top: 2px;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid #3e7bff40;
        }

        .order-total {
            display: flex;
            flex-direction: column;
        }

        .total-label {
            font-size: 0.6rem;
            color: #8fb8ff;
            text-transform: uppercase;
        }

        .total-value {
            font-size: 1rem;
            font-weight: 700;
            color: #2ecc71;
        }

        .total-currency {
            font-size: 0.7rem;
            color: #8fb8ff;
            margin-left: 2px;
        }

        .order-actions {
            display: flex;
            gap: 8px;
        }

        .order-btn {
            background: #10213f;
            border: 2px solid;
            border-radius: 25px;
            padding: 6px 15px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Montserrat', sans-serif;
        }

        .order-btn.complete {
            border-color: #2ecc71;
            color: #2ecc71;
        }

        .order-btn.complete:hover {
            background: #2ecc71;
            color: black;
            box-shadow: 0 0 15px #2ecc71;
        }

        .order-btn.delete {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .order-btn.delete:hover {
            background: #e74c3c;
            color: black;
            box-shadow: 0 0 15px #e74c3c;
        }

        .empty-orders {
            text-align: center;
            color: #8fb8ff;
            padding: 30px 20px;
            border: 2px dashed #3e7bff;
            border-radius: 30px;
            background: rgba(8, 20, 40, 0.5);
            font-size: 0.9rem;
        }

        .ship-display {
            margin-top: 10px;
            text-align: center;
            font-size: 0.7rem;
            color: #8fb8ff;
            letter-spacing: 2px;
            border-top: 2px solid #3e7bff;
            padding-top: 8px;
            position: relative;
            z-index: 2;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
        }

        @media (max-width: 400px) {
            .ship-name { font-size: 1.8rem; }
            .cargo-icon { font-size: 1.8rem; }
            .cargo-name { font-size: 0.8rem; }
            .order-items-list { grid-template-columns: 1fr; }
            .order-footer { flex-direction: column; gap: 10px; }
            .order-actions { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="ship-hud">
        <div class="hologram-ring"></div>
        <div class="hologram-ring2"></div>

        <div class="ship-header">
            <div class="ship-title">
                <div class="ship-name">VAPEOPT</div>
                <div class="ship-sub">АДМИН-ПАНЕЛЬ</div>
            </div>
            <div class="header-controls">
                <a href="index.html" class="control-btn" title="На главную">🏠</a>
            </div>
        </div>

        <div class="ship-grid" id="shipGrid">
            <!-- Блоки будут заполнены динамически -->
        </div>

        <!-- Кнопка заказов внизу -->
        <div class="orders-button">
            <button class="orders-btn" id="showOrdersBtn">
                📋 ЗАКАЗЫ
                <span class="order-count" id="pendingOrdersCount">0</span>
            </button>
        </div>

        <div class="ship-display">
            <span>▼ ПАНЕЛЬ УПРАВЛЕНИЯ ▼</span>
        </div>
    </div>

    <!-- Модальное окно заказов -->
    <div class="orders-modal" id="ordersModal">
        <div class="orders-modal-content">
            <div class="orders-modal-header">
                <h2>📋 УПРАВЛЕНИЕ ЗАКАЗАМИ</h2>
                <button class="close-orders-modal" id="closeOrdersModal">✕</button>
            </div>

            <div class="orders-tabs">
                <div class="orders-tab active" onclick="switchOrdersTab('pending')" id="tabPending">🕒 НЕВЫПОЛНЕННЫЕ</div>
                <div class="orders-tab" onclick="switchOrdersTab('completed')" id="tabCompleted">✅ ВЫПОЛНЕННЫЕ</div>
            </div>

            <div class="orders-scroll-area">
                <div class="orders-grid" id="ordersGrid"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let currentTab = 'pending';
        let orders = [];
        let allOrders = [];

        // ==================== ФУНКЦИИ ДЛЯ РАЗДЕЛОВ ТОВАРОВ ====================
        async function getSectionsData() {
            try {
                const [liquids, consumables, pod, disposables, snus] = await Promise.all([
                    FirestoreService.getCollection('liquids'),
                    FirestoreService.getCollection('consumables'),
                    FirestoreService.getCollection('pod'),
                    FirestoreService.getCollection('disposables'),
                    FirestoreService.getCollection('snus')
                ]);
                
                const liquidsInStock = liquids.filter(l => 
                    l.flavors && l.flavors.some(f => f.inStock !== false)
                ).length;
                
                const liquidsOutOfStock = liquids.filter(l => 
                    !l.flavors || !l.flavors.some(f => f.inStock !== false)
                ).length;
                
                const consumablesInStock = consumables.filter(c => 
                    c.items && c.items.some(item => item.inStock !== false)
                ).length;
                
                const consumablesOutOfStock = consumables.filter(c => 
                    !c.items || !c.items.some(item => item.inStock !== false)
                ).length;
                
                const podInStock = pod.filter(p => 
                    p.items && p.items.some(item => item.inStock !== false)
                ).length;
                
                const podOutOfStock = pod.filter(p => 
                    !p.items || !p.items.some(item => item.inStock !== false)
                ).length;
                
                const disposablesInStock = disposables.filter(d => 
                    d.items && d.items.some(item => item.inStock !== false)
                ).length;
                
                const disposablesOutOfStock = disposables.filter(d => 
                    !d.items || !d.items.some(item => item.inStock !== false)
                ).length;
                
                const snusInStock = snus.filter(s => 
                    s.items && s.items.some(item => item.inStock !== false)
                ).length;
                
                const snusOutOfStock = snus.filter(s => 
                    !s.items || !s.items.some(item => item.inStock !== false)
                ).length;
                
                return [
                    { 
                        name: 'Жидкости', 
                        icon: '🧪', 
                        inStock: liquidsInStock, 
                        outOfStock: liquidsOutOfStock,
                        link: 'zhidk-admin.html'
                    },
                    { 
                        name: 'Расходники', 
                        icon: '⚙️', 
                        inStock: consumablesInStock, 
                        outOfStock: consumablesOutOfStock,
                        link: 'rashod-admin.html'
                    },
                    { 
                        name: 'POD', 
                        icon: '📦', 
                        inStock: podInStock, 
                        outOfStock: podOutOfStock,
                        link: 'pod-admin.html'
                    },
                    { 
                        name: 'Одноразки', 
                        icon: '💨', 
                        inStock: disposablesInStock, 
                        outOfStock: disposablesOutOfStock,
                        link: 'odnoraz-admin.html'
                    },
                    { 
                        name: 'Снюс', 
                        icon: '🫑', 
                        inStock: snusInStock, 
                        outOfStock: snusOutOfStock,
                        link: 'snus-admin.html'
                    }
                ];
            } catch (error) {
                console.error('Ошибка получения данных:', error);
                return [];
            }
        }

        const grid = document.getElementById('shipGrid');
        const ordersGrid = document.getElementById('ordersGrid');
        const pendingOrdersCount = document.getElementById('pendingOrdersCount');

        function createModule(section) {
            const module = document.createElement('div');
            module.className = 'cargo-module';
            
            const stockClass = section.inStock > 0 ? 'in-stock' : 'out-of-stock';
            const stockText = section.inStock > 0 ? `в наличии: ${section.inStock}` : `нет в наличии: ${section.outOfStock}`;

            module.innerHTML = `
                <span class="cargo-icon">${section.icon}</span>
                <span class="cargo-name">${section.name}</span>
                <span class="stock-status ${stockClass}">${stockText}</span>
            `;

            module.addEventListener('click', function() {
                window.location.href = section.link;
            });

            return module;
        }

        async function updateDisplay() {
            grid.innerHTML = '';
            const sectionsData = await getSectionsData();
            
            if (sectionsData.length === 0) return;
            
            for (let i = 0; i < 4; i++) {
                grid.appendChild(createModule(sectionsData[i]));
            }
            
            const lastRow = document.createElement('div');
            lastRow.className = 'last-row';
            
            const snusModule = createModule(sectionsData[4]);
            lastRow.appendChild(snusModule);
            
            const emptyModule = document.createElement('div');
            emptyModule.style.visibility = 'hidden';
            emptyModule.style.pointerEvents = 'none';
            emptyModule.className = 'cargo-module';
            emptyModule.style.background = 'transparent';
            emptyModule.style.boxShadow = 'none';
            emptyModule.style.border = 'none';
            lastRow.appendChild(emptyModule);
            
            grid.appendChild(lastRow);
        }

        // ==================== ФУНКЦИИ ДЛЯ РАБОТЫ С ЗАКАЗАМИ ====================
        async function loadOrders() {
            try {
                allOrders = await FirestoreService.getCollection('orders');
                // Сортируем по номеру заказа (от новых к старым)
                allOrders.sort((a, b) => (b.orderNumber || 0) - (a.orderNumber || 0));
                
                // Обновляем счетчик невыполненных заказов
                const pendingCount = allOrders.filter(o => o.status === 'pending').length;
                pendingOrdersCount.textContent = pendingCount;
                
                filterOrdersByTab();
            } catch (error) {
                console.error('Ошибка загрузки заказов:', error);
                allOrders = [];
                pendingOrdersCount.textContent = '0';
                filterOrdersByTab();
            }
        }

        function filterOrdersByTab() {
            orders = allOrders.filter(order => order.status === currentTab);
            displayOrders();
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return `${date.getDate().toString().padStart(2, '0')}.${(date.getMonth() + 1).toString().padStart(2, '0')}.${date.getFullYear()}`;
        }

        function getItemDetails(item) {
            if (item.flavorName) {
                return `${item.flavorName} • ${item.strengthText || '0'} мг`;
            } else if (item.resistance) {
                return `${item.itemName} • ${item.resistance} Ом`;
            } else if (item.type === 'pod') {
                return item.itemName;
            } else if (item.strength && item.puffs) {
                return `${item.itemName} • ${item.strength}%`;
            } else if (item.type === 'snus') {
                return `${item.itemName} • ${item.strength} мг`;
            }
            return '';
        }

        function displayOrders() {
            if (orders.length === 0) {
                ordersGrid.innerHTML = `<div class="empty-orders">НЕТ ${currentTab === 'pending' ? 'НЕВЫПОЛНЕННЫХ' : 'ВЫПОЛНЕННЫХ'} ЗАКАЗОВ</div>`;
                return;
            }

            let html = '';

            orders.forEach((order, index) => {
                const orderDate = formatDate(order.createdAt);
                const itemsPreview = order.items.slice(0, 2);
                const remainingItems = order.items.length - 2;

                let itemsHtml = '<div class="order-items-list">';
                
                itemsPreview.forEach(item => {
                    const itemName = item.name || item.itemName || 'Товар';
                    const itemDetails = getItemDetails(item);
                    
                    itemsHtml += `
                        <div class="order-mini-item">
                            <div class="order-mini-item-name">${itemName.substring(0, 15)}${itemName.length > 15 ? '...' : ''}</div>
                            <div class="order-mini-item-details">${itemDetails}</div>
                            <div class="order-mini-item-price">${item.price} ₽ × ${item.quantity}</div>
                        </div>
                    `;
                });
                
                if (remainingItems > 0) {
                    itemsHtml += `<div class="order-mini-item">
                        <div class="order-mini-item-name">+ еще ${remainingItems}</div>
                    </div>`;
                }
                
                itemsHtml += '</div>';

                html += `
                    <div class="order-card ${order.status}">
                        <div class="order-header">
                            <span class="order-number">${order.orderId || `№${String(order.orderNumber).padStart(3, '0')}`}</span>
                            <span class="order-date">${orderDate}</span>
                        </div>
                        
                        <div class="order-customer">
                            <span class="customer-telegram">${order.customer?.telegram || '@username'}</span>
                            <span class="customer-name">${order.customer?.name || 'Имя'}</span>
                        </div>

                        ${itemsHtml}

                        <div class="order-footer">
                            <div class="order-total">
                                <span class="total-label">ИТОГО:</span>
                                <span class="total-value">${order.totalPrice || 0}<span class="total-currency"> BYN</span></span>
                            </div>
                            
                            <div class="order-actions">
                                ${currentTab === 'pending' ? 
                                    `<button class="order-btn complete" onclick="completeOrder('${order.id}')">✅ ВЫПОЛНЕНО</button>` : 
                                    ''
                                }
                                <button class="order-btn delete" onclick="deleteOrder('${order.id}')">🗑️ УДАЛИТЬ</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            ordersGrid.innerHTML = html;
        }

        // Переключение между вкладками
        window.switchOrdersTab = function(tab) {
            currentTab = tab;
            
            document.getElementById('tabPending').classList.remove('active');
            document.getElementById('tabCompleted').classList.remove('active');
            
            if (tab === 'pending') {
                document.getElementById('tabPending').classList.add('active');
            } else {
                document.getElementById('tabCompleted').classList.add('active');
            }
            
            filterOrdersByTab();
        };

        // Отметить заказ как выполненный
        window.completeOrder = async function(orderId) {
            try {
                const order = allOrders.find(o => o.id === orderId);
                if (!order) return;

                order.status = 'completed';
                await FirestoreService.saveDocument('orders', order, orderId);
                
                await loadOrders();
                
            } catch (error) {
                console.error('Ошибка при выполнении заказа:', error);
                alert('Ошибка при обновлении заказа');
            }
        };

        // Удалить заказ
        window.deleteOrder = async function(orderId) {
            if (!confirm('Удалить этот заказ? Освободившийся номер будет присвоен следующему заказу.')) return;

            try {
                const order = allOrders.find(o => o.id === orderId);
                if (!order) return;

                await FirestoreService.deleteDocument('orders', orderId);
                
                const remainingOrders = allOrders.filter(o => o.id !== orderId);
                
                remainingOrders.sort((a, b) => (a.orderNumber || 0) - (b.orderNumber || 0));
                
                for (let i = 0; i < remainingOrders.length; i++) {
                    const newNumber = i + 1;
                    if (remainingOrders[i].orderNumber !== newNumber) {
                        remainingOrders[i].orderNumber = newNumber;
                        remainingOrders[i].orderId = `№${String(newNumber).padStart(3, '0')}`;
                        await FirestoreService.saveDocument('orders', remainingOrders[i], remainingOrders[i].id);
                    }
                }
                
                await loadOrders();
                
            } catch (error) {
                console.error('Ошибка при удалении заказа:', error);
                alert('Ошибка при удалении заказа');
            }
        };

        // ==================== УПРАВЛЕНИЕ МОДАЛЬНЫМ ОКНОМ ====================
        function initModal() {
            const modal = document.getElementById('ordersModal');
            const showBtn = document.getElementById('showOrdersBtn');
            const closeBtn = document.getElementById('closeOrdersModal');

            showBtn.addEventListener('click', () => {
                modal.classList.add('show');
            });

            closeBtn.addEventListener('click', () => {
                modal.classList.remove('show');
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('show');
                }
            });
        }

        // ==================== ПОДПИСКИ НА ОБНОВЛЕНИЯ ====================
        function subscribeToUpdates() {
            FirestoreService.subscribeToCollection('liquids', () => updateDisplay());
            FirestoreService.subscribeToCollection('consumables', () => updateDisplay());
            FirestoreService.subscribeToCollection('pod', () => updateDisplay());
            FirestoreService.subscribeToCollection('disposables', () => updateDisplay());
            FirestoreService.subscribeToCollection('snus', () => updateDisplay());
            
            FirestoreService.subscribeToCollection('orders', (updatedOrders) => {
                allOrders = updatedOrders;
                allOrders.sort((a, b) => (b.orderNumber || 0) - (a.orderNumber || 0));
                
                const pendingCount = allOrders.filter(o => o.status === 'pending').length;
                pendingOrdersCount.textContent = pendingCount;
                
                filterOrdersByTab();
            });
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        async function init() {
            await updateDisplay();
            await loadOrders();
            subscribeToUpdates();
            initModal();
        }

        init();
    </script>
</body>
</html>
