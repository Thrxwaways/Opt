<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAPEOPT | АДМИН-ПАНЕЛЬ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Montserrat', 'Orbitron', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap');

        body {
            background: #03050f;
            background-image: radial-gradient(ellipse at 50% 30%, #1b2b55 0%, #020412 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .ship-hud {
            width: 100%;
            max-width: 500px;
            height: 95vh;
            max-height: 900px;
            background: rgba(2, 10, 22, 0.8);
            backdrop-filter: blur(12px);
            border: 3px solid #3e7bff;
            border-radius: 50px;
            box-shadow: 0 0 60px #1e4fcf, 0 0 30px #3e7bff inset;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .ship-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .ship-title {
            display: flex;
            flex-direction: column;
        }

        .ship-name {
            font-size: 1.8rem;
            font-weight: 900;
            color: #8fb8ff;
            text-shadow: 0 0 20px #3e7bff;
            line-height: 1;
            font-family: 'Orbitron', sans-serif;
        }

        .ship-sub {
            font-size: 0.65rem;
            color: #afc9ff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-controls {
            display: flex;
            gap: 6px;
            align-items: center;
            max-width: 55%;
        }

        .control-btn, .logout-btn {
            width: 36px;
            height: 36px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .control-btn {
            background: #10213f;
            border: 2px solid #3e7bff;
            color: #8fb8ff;
            text-decoration: none;
            box-shadow: 0 0 12px #3e7bff;
            transition: 0.2s;
        }

        .control-btn:hover {
            background: #3e7bff;
            color: black;
            transform: scale(1.1);
        }

        .logout-btn {
            background: #e74c3c;
            border: 2px solid #e74c3c;
            color: white;
            box-shadow: 0 0 12px #e74c3c;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #c0392b;
            transform: scale(1.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            background: rgba(8, 20, 40, 0.7);
            border: 2px solid #3e7bff;
            border-radius: 20px;
            font-size: 0.65rem;
            color: #8fb8ff;
            box-shadow: 0 0 8px #3e7bff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
            line-height: 1.2;
            font-weight: 500;
        }

        /* СЕТКА ТОВАРОВ - ИСПРАВЛЕНО */
        .ship-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            flex: 1 1 auto;
            overflow-y: auto;
            padding: 5px 2px;
            min-height: 0;
            margin-bottom: 10px;
        }

        .cargo-module {
            background: rgba(8, 20, 40, 0.7);
            backdrop-filter: blur(5px);
            border: 3px solid #3e7bff;
            border-radius: 25px;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 15px 30px -12px black;
            aspect-ratio: 1/1;
            width: 100%;
        }

        .cargo-module:hover {
            transform: translateY(-3px);
            border-color: #8fb8ff;
            box-shadow: 0 0 25px #3e7bff;
        }

        .last-row {
            grid-column: span 2;
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .last-row .cargo-module {
            width: calc(50% - 6px);
        }

        .cargo-icon {
            font-size: 2.2rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 8px #3e7bff);
        }

        .cargo-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: #cfdfff;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 5px;
        }

        .stock-status {
            font-size: 0.6rem;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid;
            width: fit-content;
        }

        .stock-status.in-stock {
            background: #0a2a1a;
            border-color: #2ecc71;
            color: #a0e0a0;
        }

        .stock-status.out-of-stock {
            background: #2a1a1a;
            border-color: #e74c3c;
            color: #f0a0a0;
        }

        /* Кнопка заказов - ВСЕГДА ВИДНА */
        .orders-button {
            border-top: 2px solid #3e7bff;
            padding-top: 10px;
            flex-shrink: 0;
        }

        .orders-btn {
            width: 100%;
            background: #10213f;
            border: 3px solid #3e7bff;
            color: #8fb8ff;
            padding: 12px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .orders-btn:hover {
            background: #3e7bff;
            color: black;
            transform: translateY(-2px);
            box-shadow: 0 0 20px #3e7bff;
        }

        .orders-btn .order-count {
            background: #e74c3c;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            box-shadow: 0 0 8px #e74c3c;
        }

        .ship-display {
            margin-top: 8px;
            text-align: center;
            font-size: 0.65rem;
            color: #8fb8ff;
            border-top: 2px solid #3e7bff;
            padding-top: 6px;
            flex-shrink: 0;
        }

        /* Модальное окно заказов */
        .orders-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(2, 10, 22, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .orders-modal.show {
            display: flex;
        }

        .orders-modal-content {
            width: 90%;
            max-width: 500px;
            height: 85vh;
            background: rgba(8, 20, 40, 0.95);
            border: 3px solid #3e7bff;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 0 50px #3e7bff;
            display: flex;
            flex-direction: column;
        }

        .orders-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #3e7bff;
        }

        .orders-modal-header h2 {
            color: #8fb8ff;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .close-orders-modal {
            background: none;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            width: 35px;
            height: 35px;
            border-radius: 18px;
            font-size: 1.3rem;
            cursor: pointer;
        }

        .orders-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .orders-tab {
            flex: 1;
            background: #10213f;
            border: 2px solid #3e7bff;
            border-radius: 30px;
            padding: 8px 0;
            text-align: center;
            color: #8fb8ff;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .orders-tab.active {
            background: #3e7bff;
            color: black;
        }

        .orders-scroll-area {
            flex: 1;
            overflow-y: auto;
        }

        .orders-grid {
            display: grid;
            gap: 12px;
        }

        .order-card {
            background: rgba(8, 20, 40, 0.7);
            border: 2px solid #3e7bff;
            border-radius: 20px;
            padding: 12px;
        }

        .order-card.pending {
            border-left: 5px solid #f39c12;
        }

        .order-card.completed {
            border-left: 5px solid #2ecc71;
        }

        .empty-orders {
            text-align: center;
            color: #8fb8ff;
            padding: 30px;
            border: 2px dashed #3e7bff;
            border-radius: 25px;
        }
    </style>
</head>
<body>
    <!-- Скрипты защиты -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>

    <div class="ship-hud">
        <div class="ship-header">
            <div class="ship-title">
                <div class="ship-name">VAPEOPT</div>
                <div class="ship-sub">АДМИН-ПАНЕЛЬ</div>
            </div>
            <div class="header-controls">
                <div class="user-info" id="currentUserEmail">Загрузка...</div>
                <a href="index.html" class="control-btn" title="На главную">🏠</a>
                <button class="logout-btn" id="logoutBtn" title="Выйти">🚪</button>
            </div>
        </div>

        <!-- СЕТКА ТОВАРОВ -->
        <div class="ship-grid" id="shipGrid"></div>

        <!-- Кнопка заказов -->
        <div class="orders-button">
            <button class="orders-btn" id="showOrdersBtn">
                📋 ЗАКАЗЫ
                <span class="order-count" id="pendingOrdersCount">0</span>
            </button>
        </div>

        <div class="ship-display">
            <span>▼ ПАНЕЛЬ УПРАВЛЕНИЯ ▼</span>
        </div>
    </div>

    <!-- Модальное окно заказов -->
    <div class="orders-modal" id="ordersModal">
        <div class="orders-modal-content">
            <div class="orders-modal-header">
                <h2>📋 УПРАВЛЕНИЕ ЗАКАЗАМИ</h2>
                <button class="close-orders-modal" id="closeOrdersModal">✕</button>
            </div>

            <div class="orders-tabs">
                <div class="orders-tab active" onclick="switchOrdersTab('pending')" id="tabPending">🕒 НЕВЫПОЛНЕННЫЕ</div>
                <div class="orders-tab" onclick="switchOrdersTab('completed')" id="tabCompleted">✅ ВЫПОЛНЕННЫЕ</div>
            </div>

            <div class="orders-scroll-area">
                <div class="orders-grid" id="ordersGrid"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let currentTab = 'pending';
        let allOrders = [];
        let sectionsData = [];

        // ==================== ЗАГЛУШКА ДЛЯ ТЕСТА ====================
        const mockSections = [
            { name: 'Жидкости', icon: '🧪', inStock: 3, outOfStock: 0, link: 'zhidk-admin.html' },
            { name: 'Расходники', icon: '⚙️', inStock: 2, outOfStock: 1, link: 'rashod-admin.html' },
            { name: 'POD', icon: '📦', inStock: 4, outOfStock: 0, link: 'pod-admin.html' },
            { name: 'Одноразки', icon: '💨', inStock: 5, outOfStock: 2, link: 'odnoraz-admin.html' },
            { name: 'Снюс', icon: '🫑', inStock: 1, outOfStock: 3, link: 'snus-admin.html' }
        ];

        // ==================== ФУНКЦИИ ДЛЯ РАЗДЕЛОВ ТОВАРОВ ====================
        async function getSectionsData() {
            try {
                if (typeof FirestoreService === 'undefined' || !FirestoreService.getCollection) {
                    console.log('FirestoreService не доступен, используем заглушку');
                    return mockSections;
                }

                const [liquids, consumables, pod, disposables, snus] = await Promise.all([
                    FirestoreService.getCollection('liquids').catch(() => []),
                    FirestoreService.getCollection('consumables').catch(() => []),
                    FirestoreService.getCollection('pod').catch(() => []),
                    FirestoreService.getCollection('disposables').catch(() => []),
                    FirestoreService.getCollection('snus').catch(() => [])
                ]);
                
                // Если данные не получены, используем заглушку
                if (!liquids.length && !consumables.length && !pod.length && !disposables.length && !snus.length) {
                    return mockSections;
                }
                
                const liquidsInStock = liquids.filter(l => l.flavors?.some(f => f.inStock !== false)).length;
                const liquidsOutOfStock = liquids.filter(l => !l.flavors?.some(f => f.inStock !== false)).length;
                
                const consumablesInStock = consumables.filter(c => c.items?.some(item => item.inStock !== false)).length;
                const consumablesOutOfStock = consumables.filter(c => !c.items?.some(item => item.inStock !== false)).length;
                
                const podInStock = pod.filter(p => p.items?.some(item => item.inStock !== false)).length;
                const podOutOfStock = pod.filter(p => !p.items?.some(item => item.inStock !== false)).length;
                
                const disposablesInStock = disposables.filter(d => d.items?.some(item => item.inStock !== false)).length;
                const disposablesOutOfStock = disposables.filter(d => !d.items?.some(item => item.inStock !== false)).length;
                
                const snusInStock = snus.filter(s => s.items?.some(item => item.inStock !== false)).length;
                const snusOutOfStock = snus.filter(s => !s.items?.some(item => item.inStock !== false)).length;
                
                return [
                    { name: 'Жидкости', icon: '🧪', inStock: liquidsInStock, outOfStock: liquidsOutOfStock, link: 'zhidk-admin.html' },
                    { name: 'Расходники', icon: '⚙️', inStock: consumablesInStock, outOfStock: consumablesOutOfStock, link: 'rashod-admin.html' },
                    { name: 'POD', icon: '📦', inStock: podInStock, outOfStock: podOutOfStock, link: 'pod-admin.html' },
                    { name: 'Одноразки', icon: '💨', inStock: disposablesInStock, outOfStock: disposablesOutOfStock, link: 'odnoraz-admin.html' },
                    { name: 'Снюс', icon: '🫑', inStock: snusInStock, outOfStock: snusOutOfStock, link: 'snus-admin.html' }
                ];
            } catch (error) {
                console.error('Ошибка получения данных:', error);
                return mockSections;
            }
        }

        function createModule(section) {
            const module = document.createElement('div');
            module.className = 'cargo-module';
            
            const stockClass = section.inStock > 0 ? 'in-stock' : 'out-of-stock';
            const stockText = section.inStock > 0 ? `в наличии: ${section.inStock}` : `нет в наличии: ${section.outOfStock}`;

            module.innerHTML = `
                <span class="cargo-icon">${section.icon}</span>
                <span class="cargo-name">${section.name}</span>
                <span class="stock-status ${stockClass}">${stockText}</span>
            `;

            module.addEventListener('click', () => window.location.href = section.link);
            return module;
        }

        async function updateDisplay() {
            const grid = document.getElementById('shipGrid');
            if (!grid) return;
            
            // ВАЖНО: Полностью очищаем сетку перед добавлением
            grid.innerHTML = '';
            
            sectionsData = await getSectionsData();
            if (!sectionsData || sectionsData.length === 0) return;
            
            // Первые 4 блока
            for (let i = 0; i < 4; i++) {
                grid.appendChild(createModule(sectionsData[i]));
            }
            
            // Последний ряд
            const lastRow = document.createElement('div');
            lastRow.className = 'last-row';
            
            lastRow.appendChild(createModule(sectionsData[4]));
            
            const emptyModule = document.createElement('div');
            emptyModule.style.visibility = 'hidden';
            emptyModule.style.pointerEvents = 'none';
            emptyModule.className = 'cargo-module';
            emptyModule.style.background = 'transparent';
            emptyModule.style.border = 'none';
            emptyModule.style.boxShadow = 'none';
            lastRow.appendChild(emptyModule);
            
            grid.appendChild(lastRow);
        }

        // ==================== ФУНКЦИИ ДЛЯ ЗАКАЗОВ ====================
        async function loadOrders() {
            try {
                if (typeof FirestoreService !== 'undefined') {
                    allOrders = await FirestoreService.getCollection('orders') || [];
                } else {
                    allOrders = [];
                }
                updateOrdersDisplay();
            } catch (error) {
                console.error('Ошибка загрузки заказов:', error);
                allOrders = [];
                updateOrdersDisplay();
            }
        }

        function updateOrdersDisplay() {
            const pendingCount = allOrders.filter(o => o.status === 'pending').length;
            document.getElementById('pendingOrdersCount').textContent = pendingCount;
            filterOrdersByTab();
        }

        function filterOrdersByTab() {
            const orders = allOrders.filter(o => o.status === currentTab);
            const ordersGrid = document.getElementById('ordersGrid');
            
            if (orders.length === 0) {
                ordersGrid.innerHTML = `<div class="empty-orders">НЕТ ${currentTab === 'pending' ? 'НЕВЫПОЛНЕННЫХ' : 'ВЫПОЛНЕННЫХ'} ЗАКАЗОВ</div>`;
                return;
            }

            let html = '';
            orders.forEach(order => {
                html += `
                    <div class="order-card ${order.status}">
                        <div class="order-header">
                            <span class="order-number">${order.orderId || 'Заказ'}</span>
                            <span class="order-date">${new Date(order.createdAt).toLocaleDateString()}</span>
                        </div>
                        <div class="order-customer">
                            <span>${order.customer?.telegram || '@username'}</span>
                            <span>${order.customer?.name || 'Имя'}</span>
                        </div>
                        <div class="order-footer">
                            <span>ИТОГО: ${order.totalPrice || 0} BYN</span>
                        </div>
                    </div>
                `;
            });
            ordersGrid.innerHTML = html;
        }

        window.switchOrdersTab = function(tab) {
            currentTab = tab;
            document.getElementById('tabPending').classList.remove('active');
            document.getElementById('tabCompleted').classList.remove('active');
            document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
            filterOrdersByTab();
        };

        // ==================== УПРАВЛЕНИЕ МОДАЛЬНЫМ ОКНОМ ====================
        function initModal() {
            const modal = document.getElementById('ordersModal');
            const showBtn = document.getElementById('showOrdersBtn');
            const closeBtn = document.getElementById('closeOrdersModal');

            showBtn.addEventListener('click', () => {
                modal.classList.add('show');
            });

            closeBtn.addEventListener('click', () => {
                modal.classList.remove('show');
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('show');
                }
            });
        }

        // ==================== ПОДПИСКИ НА ОБНОВЛЕНИЯ ====================
        function subscribeToUpdates() {
            if (typeof FirestoreService !== 'undefined') {
                // Подписываемся на изменения товаров
                FirestoreService.subscribeToCollection('liquids', updateDisplay);
                FirestoreService.subscribeToCollection('consumables', updateDisplay);
                FirestoreService.subscribeToCollection('pod', updateDisplay);
                FirestoreService.subscribeToCollection('disposables', updateDisplay);
                FirestoreService.subscribeToCollection('snus', updateDisplay);
                
                // Подписываемся на изменения заказов
                FirestoreService.subscribeToCollection('orders', (updatedOrders) => {
                    allOrders = updatedOrders;
                    updateOrdersDisplay();
                });
            }
        }

        // ==================== АВТОРИЗАЦИЯ ====================
        function setupAuth() {
            const userEmailSpan = document.getElementById('currentUserEmail');
            if (typeof auth !== 'undefined') {
                auth.onAuthStateChanged(user => {
                    if (user) {
                        userEmailSpan.textContent = user.email;
                    }
                });
            }

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                if (typeof auth !== 'undefined') {
                    await auth.signOut();
                    window.location.href = 'login.html';
                }
            });
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        async function init() {
            await updateDisplay();  // Один раз загружаем товары
            await loadOrders();      // Загружаем заказы
            subscribeToUpdates();    // Подписываемся на обновления
            initModal();             // Инициализируем модальное окно
            setupAuth();             // Настраиваем авторизацию
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
