<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAPEOPT | SPACESHIP HUD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            font-family: 'Montserrat', 'Orbitron', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap');

        body {
            background: #03050f;
            background-image: radial-gradient(ellipse at 50% 30%, #1b2b55 0%, #020412 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        a:focus,
        button:focus,
        div:focus,
        .cargo-module:focus,
        .cart-icon:focus,
        .admin-ship:focus {
            outline: none !important;
            box-shadow: none !important;
        }

        :focus {
            outline: none !important;
        }

        ::-moz-focus-inner {
            border: 0;
        }

        ::selection {
            background: transparent;
        }

        .ship-hud {
            width: 100%;
            max-width: 500px;
            height: 95vh;
            max-height: 900px;
            background: rgba(2, 10, 22, 0.8);
            backdrop-filter: blur(12px);
            border: 3px solid #3e7bff;
            border-radius: 50px;
            box-shadow: 0 0 60px #1e4fcf, 0 0 30px #3e7bff inset;
            padding: 30px 22px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .ship-hud::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 10px;
            background: linear-gradient(90deg, transparent, #3e7bff, transparent);
            animation: scanLine 4s linear infinite;
            opacity: 0.5;
        }

        @keyframes scanLine {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .hologram-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border: 2px dashed #3e7bff30;
            border-radius: 50%;
            pointer-events: none;
            animation: rotateRing 20s linear infinite;
        }

        .hologram-ring2 {
            width: 300px;
            height: 300px;
            border: 1px solid #3e7bff20;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotateRingReverse 15s linear infinite;
        }

        @keyframes rotateRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes rotateRingReverse {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(-360deg); }
        }

        .ship-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 2;
        }

        .ship-title {
            display: flex;
            flex-direction: column;
        }

        .ship-name {
            font-size: 3.5rem;
            font-weight: 900;
            color: #8fb8ff;
            text-shadow: 0 0 20px #3e7bff, 0 0 40px #1e4fcf;
            letter-spacing: 4px;
            line-height: 1;
            font-family: 'Orbitron', sans-serif;
            animation: glowPulse 3s ease-in-out infinite;
        }

        .ship-sub {
            font-size: 1rem;
            color: #afc9ff;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 20px #3e7bff, 0 0 40px #1e4fcf; }
            50% { text-shadow: 0 0 30px #5f9eff, 0 0 60px #2f6fdf; }
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .cart-icon {
            position: relative;
            background: #10213f;
            border: 2px solid #3e7bff;
            color: #8fb8ff;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            text-decoration: none;
            box-shadow: 0 0 20px #3e7bff;
            transition: 0.2s;
            cursor: pointer;
        }

        .cart-icon:hover {
            background: #3e7bff;
            color: black;
            transform: scale(1.1);
        }

        .cart-icon.hidden {
            display: none;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            font-size: 0.8rem;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #3e7bff;
            box-shadow: 0 0 10px #e74c3c;
        }

        .admin-ship {
            background: #10213f;
            border: 2px solid #3e7bff;
            color: #8fb8ff;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            text-decoration: none;
            box-shadow: 0 0 20px #3e7bff;
            transition: 0.2s;
        }

        .admin-ship:hover {
            background: #3e7bff;
            color: black;
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 0 30px #3e7bff;
        }

        .ship-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            flex: 1;
            align-content: start;
            padding-top: 20px;
            position: relative;
            z-index: 2;
        }

        .cargo-module {
            background: rgba(8, 20, 40, 0.7);
            backdrop-filter: blur(5px);
            border: 3px solid #3e7bff;
            border-radius: 30px;
            padding: 20px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 15px 30px -12px black, 0 0 0 2px #8fb8ff inset;
            aspect-ratio: 1/1;
            position: relative;
            overflow: hidden;
        }

        /* Специальный контейнер для последнего ряда */
        .last-row {
            grid-column: span 2;
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 0;
        }

        .last-row .cargo-module {
            width: calc(50% - 9px);
            margin: 0;
        }

        .cargo-module:hover {
            transform: translateY(-5px);
            border-color: #8fb8ff;
            box-shadow: 0 0 40px #3e7bff, 0 0 20px #8fb8ff inset;
        }

        .cargo-module::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(90deg, 
                    transparent, 
                    transparent 10px,
                    rgba(62, 123, 255, 0.1) 10px,
                    rgba(62, 123, 255, 0.1) 12px
                ),
                repeating-linear-gradient(0deg, 
                    transparent, 
                    transparent 10px,
                    rgba(62, 123, 255, 0.1) 10px,
                    rgba(62, 123, 255, 0.1) 12px
                );
            border-radius: 28px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            animation: electricity 0.5s steps(2) infinite;
        }

        .cargo-module:hover::after {
            opacity: 0.8;
        }

        @keyframes electricity {
            0% { background-position: 0 0; }
            100% { background-position: 20px 20px; }
        }

        .cargo-icon {
            font-size: 3.2rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 10px #3e7bff);
            animation: iconFloat 3s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .cargo-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #cfdfff;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: textGlow 2s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 5px #8fb8ff; }
            50% { text-shadow: 0 0 15px #8fb8ff; }
        }

        .cargo-data {
            font-size: 0.8rem;
            padding: 3px 15px;
            border-radius: 20px;
            margin-top: 6px;
            border: 1px solid;
            animation: dataPulse 2s ease-in-out infinite;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            z-index: 2;
        }

        .cargo-data.positive {
            background: #0a2a1a;
            border-color: #2ecc71;
            color: #a0e0a0;
            text-shadow: 0 0 5px #2ecc71;
        }

        .cargo-data.positive:hover {
            background: #1a4a2a;
            box-shadow: 0 0 20px #2ecc71;
        }

        .cargo-data.zero {
            background: #2a1a1a;
            border-color: #e74c3c;
            color: #f0a0a0;
            text-shadow: 0 0 5px #e74c3c;
        }

        @keyframes dataPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .ship-display {
            margin-top: 20px;
            text-align: center;
            font-size: 1.3rem;
            color: #8fb8ff;
            letter-spacing: 5px;
            border-top: 2px solid #3e7bff;
            padding-top: 15px;
            position: relative;
            z-index: 2;
            font-weight: 400;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .ship-display span {
            animation: flicker 2s infinite;
        }

        .arrow-up {
            font-size: 2rem;
            color: #3e7bff;
            animation: arrowBounce 1s ease-in-out infinite;
            display: inline-block;
            filter: drop-shadow(0 0 10px #3e7bff);
            transform: rotate(180deg);
        }

        .arrow-left {
            animation: arrowLeftBounce 1s ease-in-out infinite;
        }

        .arrow-right {
            animation: arrowRightBounce 1s ease-in-out infinite;
        }

        @keyframes arrowBounce {
            0%, 100% { transform: rotate(180deg) translateY(0); }
            50% { transform: rotate(180deg) translateY(-8px); }
        }

        @keyframes arrowLeftBounce {
            0%, 100% { transform: rotate(180deg) translateX(0) translateY(0); }
            50% { transform: rotate(180deg) translateX(-5px) translateY(-8px); }
        }

        @keyframes arrowRightBounce {
            0%, 100% { transform: rotate(180deg) translateX(0) translateY(0); }
            50% { transform: rotate(180deg) translateX(5px) translateY(-8px); }
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(2, 10, 22, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .cart-modal.show {
            display: flex;
        }

        .cart-content {
            width: 90%;
            max-width: 450px;
            max-height: 80vh;
            background: rgba(8, 20, 40, 0.9);
            border: 3px solid #3e7bff;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 0 50px #3e7bff;
            overflow-y: auto;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #3e7bff;
            padding-bottom: 10px;
        }

        .cart-header h2 {
            color: #8fb8ff;
            font-size: 1.5rem;
            letter-spacing: 3px;
        }

        .close-cart {
            background: none;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-cart:hover {
            background: #e74c3c;
            color: black;
        }

        .cart-items {
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border: 2px solid #3e7bff;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .cart-item-info {
            display: flex;
            flex-direction: column;
        }

        .cart-item-name {
            color: #8fb8ff;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .cart-item-price {
            color: #2ecc71;
            font-size: 0.9rem;
        }

        .cart-item-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .cart-item-count {
            color: white;
            font-size: 1.1rem;
            min-width: 30px;
            text-align: center;
        }

        .cart-item-btn {
            background: #10213f;
            border: 2px solid #3e7bff;
            color: #8fb8ff;
            width: 30px;
            height: 30px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .cart-item-btn:hover {
            background: #3e7bff;
            color: black;
        }

        .cart-item-btn.remove {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .cart-item-btn.remove:hover {
            background: #e74c3c;
            color: black;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 2px solid #3e7bff;
            color: #8fb8ff;
            font-size: 1.2rem;
        }

        .checkout-btn {
            width: 100%;
            background: #10213f;
            border: 3px solid #2ecc71;
            color: #2ecc71;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .checkout-btn:hover {
            background: #2ecc71;
            color: black;
            box-shadow: 0 0 30px #2ecc71;
        }

        @media (max-width: 400px) {
            .ship-name { font-size: 2.8rem; }
            .cargo-icon { font-size: 2.5rem; }
            .cargo-name { font-size: 1.2rem; }
            .ship-display { font-size: 1rem; gap: 10px; }
            .arrow-up { font-size: 1.5rem; }
            .last-row .cargo-module { width: calc(50% - 7.5px); }
        }
    </style>
</head>
<body>
    <div class="ship-hud">
        <div class="hologram-ring"></div>
        <div class="hologram-ring2"></div>

        <div class="ship-header">
            <div class="ship-title">
                <div class="ship-name">VAPEOPT</div>
                <div class="ship-sub">КАТАЛОГ ТОВАРОВ</div>
            </div>
            <div class="header-controls">
                <div class="cart-icon hidden" id="cartIcon">
                    🛒
                    <span class="cart-count" id="cartCount">0</span>
                </div>
                <a href="#" class="admin-ship" id="adminShip">⚡</a>
            </div>
        </div>

        <div class="ship-grid" id="shipGrid">
            <!-- Блоки будут заполнены динамически -->
        </div>

        <div class="ship-display">
            <span class="arrow-up arrow-left">▲</span>
            <span>ВЫБЕРИТЕ РАЗДЕЛ</span>
            <span class="arrow-up arrow-right">▲</span>
        </div>
    </div>

    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>КОРЗИНА</h2>
                <button class="close-cart" id="closeCart">✕</button>
            </div>
            <div class="cart-items" id="cartItems"></div>
            <div class="cart-total">
                <span>ИТОГО:</span>
                <span id="cartTotal">0</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">ОФОРМИТЬ ЗАКАЗ</button>
        </div>
    </div>

    <script>
        // Функция для получения количества товаров из разных разделов
        function getSectionCounts() {
            // Получаем жидкости из localStorage
            const liquids = JSON.parse(localStorage.getItem('vapeopt_liquids')) || [];
            const liquidsInStock = liquids.filter(l => 
                l.flavors && l.flavors.some(f => f.inStock !== false)
            ).length;
            
            // Получаем расходники из localStorage
            const consumables = JSON.parse(localStorage.getItem('vapeopt_consumables')) || [];
            const consumablesInStock = consumables.filter(c => 
                c.items && c.items.some(item => item.inStock !== false)
            ).length;
            
            // Получаем POD системы из localStorage
            const pod = JSON.parse(localStorage.getItem('vapeopt_pod')) || [];
            const podInStock = pod.filter(p => 
                p.items && p.items.some(item => item.inStock !== false)
            ).length;
            
            // Получаем одноразки из localStorage
            const odnorazki = JSON.parse(localStorage.getItem('vapeopt_odnorazki')) || [];
            const odnorazkiInStock = odnorazki.filter(o => 
                o.items && o.items.some(item => item.inStock !== false)
            ).length;
            
            // Получаем снюс из localStorage
            const snus = JSON.parse(localStorage.getItem('vapeopt_snus')) || [];
            const snusInStock = snus.filter(s => 
                s.items && s.items.some(item => item.inStock !== false)
            ).length;
            
            return {
                liquids: liquidsInStock,
                consumables: consumablesInStock,
                pod: podInStock,
                disposable: odnorazkiInStock,
                snus: snusInStock
            };
        }

        // Данные о разделах с ссылками
        const sections = [
            { id: 1, name: 'Жидкости', icon: '🧪', count: getSectionCounts().liquids, price: 299, link: 'zhidkosti.html' },
            { id: 2, name: 'Расходники', icon: '⚙️', count: getSectionCounts().consumables, price: 199, link: 'rashodniki.html' },
            { id: 3, name: 'POD', icon: '📦', count: getSectionCounts().pod, price: 1299, link: 'pod.html' },
            { id: 4, name: 'Одноразки', icon: '💨', count: getSectionCounts().disposable, price: 699, link: 'odnorazki.html' },
            { id: 5, name: 'Снюс', icon: '🫑', count: getSectionCounts().snus, price: 349, link: 'snus.html' }
        ];

        // Корзина
        let cart = JSON.parse(localStorage.getItem('vapeopt_cart')) || [];

        function getCountClass(count) {
            return count > 0 ? 'positive' : 'zero';
        }

        function getCountText(count) {
            if (count > 0) {
                return `В наличии: ${count}`;
            } else {
                return `Нет в наличии`;
            }
        }

        function updateCartDisplay() {
            const cartIcon = document.getElementById('cartIcon');
            const cartCount = document.getElementById('cartCount');
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            
            if (cart.length > 0) {
                cartIcon.classList.remove('hidden');
                const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
                cartCount.textContent = totalItems;
            } else {
                cartIcon.classList.add('hidden');
            }

            if (cartItems) {
                if (cart.length === 0) {
                    cartItems.innerHTML = '<div style="color: #8fb8ff; text-align: center; padding: 20px;">Корзина пуста</div>';
                    cartTotal.textContent = '0 ₽';
                } else {
                    let html = '';
                    let total = 0;
                    
                    cart.forEach((item, index) => {
                        total += item.price * item.quantity;
                        
                        let itemDetails = '';
                        if (item.flavorName) {
                            itemDetails = `- ${item.flavorName}`;
                        } else if (item.resistance) {
                            itemDetails = `- ${item.resistance} Ом ${item.volume ? `- ${item.volume} мл` : ''}`;
                        } else if (item.strength) {
                            itemDetails = `- ${item.strength}% ${item.puffs ? `- ${item.puffs} тяг` : ''}`;
                        } else if (item.color) {
                            itemDetails = `- ${item.color}`;
                        }
                        
                        html += `
                            <div class="cart-item">
                                <div class="cart-item-info">
                                    <span class="cart-item-name">${item.name} ${itemDetails}</span>
                                    ${item.oldPrice ? `<span class="cart-item-old-price" style="font-size: 0.7rem; color: #a0aec0; text-decoration: line-through;">${item.oldPrice} ₽</span>` : ''}
                                    <span class="cart-item-price">${item.price} ₽ × ${item.quantity}</span>
                                </div>
                                <div class="cart-item-controls">
                                    <button class="cart-item-btn" onclick="updateCartItem(${index}, -1)">−</button>
                                    <span class="cart-item-count">${item.quantity}</span>
                                    <button class="cart-item-btn" onclick="updateCartItem(${index}, 1)">+</button>
                                    <button class="cart-item-btn remove" onclick="removeFromCart(${index})">✕</button>
                                </div>
                            </div>
                        `;
                    });
                    
                    cartItems.innerHTML = html;
                    cartTotal.textContent = total + ' ₽';
                }
            }
            
            localStorage.setItem('vapeopt_cart', JSON.stringify(cart));
        }

        window.updateCartItem = function(index, change) {
            if (index >= 0 && index < cart.length) {
                const newQuantity = cart[index].quantity + change;
                
                if (newQuantity <= 0) {
                    cart.splice(index, 1);
                } else {
                    cart[index].quantity = newQuantity;
                }
                
                updateCartDisplay();
            }
        };

        window.removeFromCart = function(index) {
            if (index >= 0 && index < cart.length) {
                cart.splice(index, 1);
                updateCartDisplay();
            }
        };

        function clearCart() {
            cart = [];
            updateCartDisplay();
        }

        function createModule(section) {
            const module = document.createElement('div');
            module.className = 'cargo-module';
            
            const countClass = getCountClass(section.count);
            const countText = getCountText(section.count);

            module.innerHTML = `
                <span class="cargo-icon">${section.icon}</span>
                <span class="cargo-name">${section.name}</span>
                <span class="cargo-data ${countClass}" data-id="${section.id}">${countText}</span>
            `;

            module.addEventListener('click', function(e) {
                // Если клик был по cargo-data, не переходим по ссылке
                if (e.target.classList.contains('cargo-data')) {
                    return;
                }
                
                if (section.link && section.link !== '#') {
                    window.location.href = section.link;
                } else {
                    alert(`Раздел "${section.name}" находится в разработке`);
                }
            });

            const countElement = module.querySelector('.cargo-data');
            countElement.addEventListener('click', function(e) {
                e.stopPropagation();
                if (section.count > 0) {
                    if (section.link && section.link !== '#') {
                        window.location.href = section.link;
                    }
                }
            });

            return module;
        }

        function updateAllSections() {
            const counts = getSectionCounts();
            sections[0].count = counts.liquids;
            sections[1].count = counts.consumables;
            sections[2].count = counts.pod;
            sections[3].count = counts.disposable;
            sections[4].count = counts.snus;
            
            const grid = document.getElementById('shipGrid');
            grid.innerHTML = '';
            
            // Добавляем первые 4 элемента в сетку 2x2
            for (let i = 0; i < 4; i++) {
                grid.appendChild(createModule(sections[i]));
            }
            
            // Создаем специальный контейнер для последнего ряда
            const lastRow = document.createElement('div');
            lastRow.className = 'last-row';
            
            // Добавляем снюс в последний ряд
            const snusModule = createModule(sections[4]);
            lastRow.appendChild(snusModule);
            
            // Добавляем пустой модуль для симметрии (невидимый)
            const emptyModule = document.createElement('div');
            emptyModule.style.visibility = 'hidden';
            emptyModule.style.pointerEvents = 'none';
            emptyModule.className = 'cargo-module';
            emptyModule.style.background = 'transparent';
            emptyModule.style.boxShadow = 'none';
            emptyModule.style.border = 'none';
            lastRow.appendChild(emptyModule);
            
            grid.appendChild(lastRow);
        }

        const grid = document.getElementById('shipGrid');
        updateAllSections();

        document.getElementById('adminShip').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'admin.html';
        });

        const cartIcon = document.getElementById('cartIcon');
        const cartModal = document.getElementById('cartModal');
        const closeCart = document.getElementById('closeCart');
        const checkoutBtn = document.getElementById('checkoutBtn');

        cartIcon.addEventListener('click', () => {
            cartModal.classList.add('show');
        });

        closeCart.addEventListener('click', () => {
            cartModal.classList.remove('show');
        });

        checkoutBtn.addEventListener('click', () => {
            if (cart.length > 0) {
                alert('Заказ оформлен! Спасибо за покупку.');
                clearCart();
                cartModal.classList.remove('show');
            }
        });

        cartModal.addEventListener('click', (e) => {
            if (e.target === cartModal) {
                cartModal.classList.remove('show');
            }
        });

        updateCartDisplay();

        // Слушаем изменения из других страниц
        window.addEventListener('storage', function(e) {
            if (e.key === 'vapeopt_liquids' || e.key === 'vapeopt_consumables' || 
                e.key === 'vapeopt_pod' || e.key === 'vapeopt_odnorazki' || 
                e.key === 'vapeopt_snus') {
                updateAllSections();
            }
            if (e.key === 'vapeopt_cart') {
                cart = JSON.parse(localStorage.getItem('vapeopt_cart')) || [];
                updateCartDisplay();
            }
        });

        // Обновляем каждые 3 секунды для синхронизации
        setInterval(() => {
            updateAllSections();
        }, 3000);
    </script>
</body>
</html>
