<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAPEOPT | КАТАЛОГ</title>
    <style>
        /* Все ваши стили остаются без изменений */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            font-family: 'Montserrat', 'Orbitron', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap');

        body {
            background: #03050f;
            background-image: radial-gradient(ellipse at 50% 30%, #1b2b55 0%, #020412 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        a:focus, button:focus, div:focus, .cargo-module:focus {
            outline: none !important;
            box-shadow: none !important;
        }

        :focus { outline: none !important; }
        ::-moz-focus-inner { border: 0; }

        .ship-hud {
            width: 100%;
            max-width: 500px;
            height: 95vh;
            max-height: 900px;
            background: rgba(2, 10, 22, 0.8);
            backdrop-filter: blur(12px);
            border: 3px solid #3e7bff;
            border-radius: 50px;
            box-shadow: 0 0 60px #1e4fcf, 0 0 30px #3e7bff inset;
            padding: 30px 22px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .ship-hud::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 10px;
            background: linear-gradient(90deg, transparent, #3e7bff, transparent);
            animation: scanLine 4s linear infinite;
            opacity: 0.5;
        }

        @keyframes scanLine {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .hologram-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border: 2px dashed #3e7bff30;
            border-radius: 50%;
            pointer-events: none;
            animation: rotateRing 20s linear infinite;
        }

        .hologram-ring2 {
            width: 300px;
            height: 300px;
            border: 1px solid #3e7bff20;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotateRingReverse 15s linear infinite;
        }

        @keyframes rotateRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes rotateRingReverse {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(-360deg); }
        }

        .ship-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 2;
        }

        .ship-title {
            display: flex;
            flex-direction: column;
        }

        .ship-name {
            font-size: 2rem;
            font-weight: 900;
            color: #8fb8ff;
            text-shadow: 0 0 20px #3e7bff, 0 0 40px #1e4fcf;
            letter-spacing: 4px;
            line-height: 1;
            font-family: 'Orbitron', sans-serif;
            animation: glowPulse 3s ease-in-out infinite;
        }

        .ship-sub {
            font-size: 0.7rem;
            color: #afc9ff;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 20px #3e7bff, 0 0 40px #1e4fcf; }
            50% { text-shadow: 0 0 30px #5f9eff, 0 0 60px #2f6fdf; }
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .cart-icon {
            position: relative;
            background: #10213f;
            border: 2px solid #3e7bff;
            color: #8fb8ff;
            width: 45px;
            height: 45px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            text-decoration: none;
            box-shadow: 0 0 20px #3e7bff;
            transition: 0.2s;
            cursor: pointer;
        }

        .cart-icon:hover {
            background: #3e7bff;
            color: black;
            transform: scale(1.1);
        }

        .cart-icon.hidden {
            display: none;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            font-size: 0.7rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #3e7bff;
            box-shadow: 0 0 10px #e74c3c;
        }

        .admin-ship {
            background: #10213f;
            border: 2px solid #3e7bff;
            color: #8fb8ff;
            width: 45px;
            height: 45px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            text-decoration: none;
            box-shadow: 0 0 20px #3e7bff;
            transition: 0.2s;
            cursor: pointer;
        }

        .admin-ship:hover {
            background: #3e7bff;
            color: black;
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 0 30px #3e7bff;
        }

        .ship-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            flex: 1;
            align-content: start;
            padding-top: 20px;
            position: relative;
            z-index: 2;
        }

        .cargo-module {
            background: rgba(8, 20, 40, 0.7);
            backdrop-filter: blur(5px);
            border: 3px solid #3e7bff;
            border-radius: 30px;
            padding: 20px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 15px 30px -12px black, 0 0 0 2px #8fb8ff inset;
            aspect-ratio: 1/1;
            position: relative;
            overflow: hidden;
        }

        .last-row {
            grid-column: span 2;
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 0;
        }

        .last-row .cargo-module {
            width: calc(50% - 9px);
            margin: 0;
        }

        .cargo-module:hover {
            transform: translateY(-5px);
            border-color: #8fb8ff;
            box-shadow: 0 0 40px #3e7bff, 0 0 20px #8fb8ff inset;
        }

        .cargo-module::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(90deg, 
                    transparent, 
                    transparent 10px,
                    rgba(62, 123, 255, 0.1) 10px,
                    rgba(62, 123, 255, 0.1) 12px
                ),
                repeating-linear-gradient(0deg, 
                    transparent, 
                    transparent 10px,
                    rgba(62, 123, 255, 0.1) 10px,
                    rgba(62, 123, 255, 0.1) 12px
                );
            border-radius: 28px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            animation: electricity 0.5s steps(2) infinite;
        }

        .cargo-module:hover::after {
            opacity: 0.8;
        }

        @keyframes electricity {
            0% { background-position: 0 0; }
            100% { background-position: 20px 20px; }
        }

        .cargo-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 10px #3e7bff);
            animation: iconFloat 3s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .cargo-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: #cfdfff;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: textGlow 2s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 5px #8fb8ff; }
            50% { text-shadow: 0 0 15px #8fb8ff; }
        }

        .cargo-data {
            font-size: 0.7rem;
            padding: 3px 12px;
            border-radius: 20px;
            margin-top: 6px;
            border: 1px solid;
            animation: dataPulse 2s ease-in-out infinite;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            z-index: 2;
        }

        .cargo-data.positive {
            background: #0a2a1a;
            border-color: #2ecc71;
            color: #a0e0a0;
            text-shadow: 0 0 5px #2ecc71;
        }

        .cargo-data.positive:hover {
            background: #1a4a2a;
            box-shadow: 0 0 20px #2ecc71;
        }

        .cargo-data.zero {
            background: #2a1a1a;
            border-color: #e74c3c;
            color: #f0a0a0;
            text-shadow: 0 0 5px #e74c3c;
        }

        @keyframes dataPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .ship-display {
            margin-top: 5px;
            text-align: center;
            font-size: 1rem;
            color: #8fb8ff;
            letter-spacing: 3px;
            border-top: 2px solid #3e7bff;
            padding-top: 10px;
            position: relative;
            z-index: 2;
            font-weight: 400;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .ship-display span {
            animation: flicker 2s infinite;
        }

        .arrow-up {
            font-size: 1.5rem;
            color: #3e7bff;
            animation: arrowBounce 1s ease-in-out infinite;
            display: inline-block;
            filter: drop-shadow(0 0 10px #3e7bff);
            transform: rotate(0deg);
        }

        .arrow-left {
            animation: arrowLeftBounce 1s ease-in-out infinite;
        }

        .arrow-right {
            animation: arrowRightBounce 1s ease-in-out infinite;
        }

        @keyframes arrowBounce {
            0%, 100% { transform: rotate(0deg) translateY(0); }
            50% { transform: rotate(0deg) translateY(-8px); }
        }

        @keyframes arrowLeftBounce {
            0%, 100% { transform: rotate(0deg) translateX(0) translateY(0); }
            50% { transform: rotate(0deg) translateX(-5px) translateY(-8px); }
        }

        @keyframes arrowRightBounce {
            0%, 100% { transform: rotate(0deg) translateX(0) translateY(0); }
            50% { transform: rotate(0deg) translateX(5px) translateY(-8px); }
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Модальное окно корзины */
        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(2, 10, 22, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .cart-modal.show {
            display: flex;
        }

        .cart-content {
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            background: rgba(8, 20, 40, 0.95);
            border: 3px solid #3e7bff;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 0 50px #3e7bff;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #3e7bff;
        }

        .cart-header h2 {
            color: #8fb8ff;
            font-size: 1.3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .close-cart {
            background: none;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            width: 35px;
            height: 35px;
            border-radius: 18px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-cart:hover {
            background: #e74c3c;
            color: black;
        }

        .cart-items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            overflow-y: auto;
            padding: 5px;
            max-height: 50vh;
        }

        .cart-item-card {
            background: rgba(8, 20, 40, 0.7);
            border: 2px solid #3e7bff;
            border-radius: 20px;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .cart-item-card:hover {
            transform: translateY(-2px);
            border-color: #8fb8ff;
            box-shadow: 0 0 20px #3e7bff;
        }

        .cart-item-image {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #3e7bff;
            margin-bottom: 8px;
        }

        .cart-item-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: #cfdfff;
            text-align: center;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .cart-item-details {
            font-size: 0.7rem;
            color: #8fb8ff;
            text-align: center;
            margin-bottom: 4px;
        }

        .cart-item-price-block {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 5px;
        }

        .cart-item-price {
            font-size: 0.85rem;
            color: #2ecc71;
            font-weight: 700;
        }

        .cart-item-quantity {
            font-size: 0.75rem;
            color: #8fb8ff;
            background: rgba(8, 20, 40, 0.8);
            border: 1px solid #3e7bff;
            border-radius: 12px;
            padding: 2px 8px;
        }

        .cart-empty {
            text-align: center;
            color: #8fb8ff;
            padding: 40px 20px;
            font-size: 1.1rem;
        }

        .cart-footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #3e7bff;
        }

        .cart-summary {
            background: rgba(8, 20, 40, 0.7);
            border: 2px solid #3e7bff;
            border-radius: 20px;
            padding: 12px 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary-left {
            display: flex;
            flex-direction: column;
        }

        .summary-label {
            color: #8fb8ff;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .summary-value {
            color: #8fb8ff;
            font-size: 1rem;
            font-weight: 700;
        }

        .summary-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .summary-price-label {
            color: #8fb8ff;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .summary-price {
            color: #2ecc71;
            font-size: 1.3rem;
            font-weight: 800;
            text-shadow: 0 0 8px #2ecc71;
        }

        .summary-currency {
            color: #8fb8ff;
            font-size: 0.8rem;
            margin-left: 2px;
        }

        /* Поля для ввода данных заказчика */
        .customer-fields {
            background: rgba(8, 20, 40, 0.5);
            border: 2px solid #3e7bff;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .customer-field {
            margin-bottom: 15px;
        }

        .customer-field:last-child {
            margin-bottom: 0;
        }

        .customer-field label {
            display: block;
            color: #8fb8ff;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            margin-left: 5px;
        }

        .customer-field input {
            width: 100%;
            background: rgba(8, 20, 40, 0.7);
            border: 2px solid #3e7bff;
            border-radius: 30px;
            padding: 10px 15px;
            color: #8fb8ff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }

        .customer-field input:focus {
            border-color: #8fb8ff;
            box-shadow: 0 0 20px #3e7bff;
        }

        .customer-field input::placeholder {
            color: #3e5a80;
        }

        .customer-field.error input {
            border-color: #e74c3c;
            box-shadow: 0 0 15px #e74c3c;
        }

        .checkout-btn {
            width: 100%;
            background: #10213f;
            border: 3px solid #2ecc71;
            color: #2ecc71;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .checkout-btn:hover {
            background: #2ecc71;
            color: black;
            box-shadow: 0 0 30px #2ecc71;
        }

        /* Уведомления */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(8, 20, 40, 0.95);
            border: 2px solid;
            border-radius: 12px;
            padding: 12px 20px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 2000;
            max-width: 300px;
            border-left-width: 4px;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.warning {
            border-color: #f39c12;
            background: rgba(243, 156, 18, 0.15);
            color: #f39c12;
        }

        .notification.error {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
        }

        .notification.success {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
        }

        .notification-content {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notification-icon {
            font-size: 1.2rem;
        }

        @media (max-width: 400px) {
            .ship-name { font-size: 1.8rem; }
            .cargo-icon { font-size: 2rem; }
            .cargo-name { font-size: 0.8rem; }
            .cart-item-image { width: 60px; height: 60px; }
            .cart-items-grid { gap: 8px; }
            .cart-item-name { font-size: 0.75rem; }
            .cart-item-details { font-size: 0.65rem; }
        }
    </style>
</head>
<body>
    <div class="ship-hud">
        <div class="hologram-ring"></div>
        <div class="hologram-ring2"></div>

        <div class="ship-header">
            <div class="ship-title">
                <div class="ship-name">VAPEOPT</div>
                <div class="ship-sub">КАТАЛОГ ТОВАРОВ</div>
            </div>
            <div class="header-controls">
                <!-- Корзина -->
                <div class="cart-icon hidden" id="cartIcon">
                    🛒
                    <span class="cart-count" id="cartCount">0</span>
                </div>
                <!-- ИСПРАВЛЕНО: теперь это ссылка, а не див -->
                <a href="login.html" class="admin-ship" id="adminLoginBtn">⚡</a>
            </div>
        </div>

        <div class="ship-grid" id="shipGrid">
            <!-- Блоки будут заполнены динамически -->
        </div>

        <div class="ship-display">
            <span class="arrow-up arrow-left">▲</span>
            <span>ВЫБЕРИТЕ РАЗДЕЛ</span>
            <span class="arrow-up arrow-right">▲</span>
        </div>
    </div>

    <!-- Модальное окно корзины -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>🛒 КОРЗИНА</h2>
                <button class="close-cart" id="closeCart">✕</button>
            </div>
            
            <div class="cart-items-grid" id="cartItemsGrid">
                <!-- Товары будут загружаться сюда -->
            </div>

            <div class="cart-footer">
                <!-- Поля для ввода данных заказчика -->
                <div class="customer-fields">
                    <div class="customer-field" id="telegramField">
                        <label>📱 TELEGRAM USERNAME</label>
                        <input type="text" id="telegramUsername" placeholder="@username" autocomplete="off">
                    </div>
                    <div class="customer-field" id="nameField">
                        <label>👤 ИМЯ</label>
                        <input type="text" id="customerName" placeholder="Введите ваше имя" autocomplete="off">
                    </div>
                </div>

                <!-- Краткая сводка -->
                <div class="cart-summary">
                    <div class="summary-left">
                        <span class="summary-label">ТОВАРОВ:</span>
                        <span class="summary-value" id="summaryItems">0</span>
                    </div>
                    <div class="summary-right">
                        <span class="summary-price-label">ИТОГО:</span>
                        <span class="summary-price" id="summaryPrice">0</span>
                        <span class="summary-currency">BYN</span>
                    </div>
                </div>

                <button class="checkout-btn" id="checkoutBtn">ОФОРМИТЬ ЗАКАЗ</button>
            </div>
        </div>
    </div>

    <!-- Уведомления -->
    <div class="notification" id="notification">
        <div class="notification-content">
            <span class="notification-icon" id="notificationIcon">⚡</span>
            <span id="notificationMessage"></span>
        </div>
    </div>

    <!-- Firebase SDK - ИСПРАВЛЕНО: версия 9.23.0 (теперь везде одинаковая) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        const sections = [
            { id: 1, name: 'Жидкости', icon: '🧪', link: 'zhidkosti.html' },
            { id: 2, name: 'Расходники', icon: '⚙️', link: 'rashodniki.html' },
            { id: 3, name: 'POD', icon: '📦', link: 'pod.html' },
            { id: 4, name: 'Одноразки', icon: '💨', link: 'odnorazki.html' },
            { id: 5, name: 'Снюс', icon: '🫑', link: 'snus.html' }
        ];

        let cart = [];
        let currentOrderNumber = 1;

        // ==================== ФУНКЦИИ РАБОТЫ С УВЕДОМЛЕНИЯМИ ====================
        function showNotification(message, type = 'warning') {
            const notification = document.getElementById('notification');
            const icon = document.getElementById('notificationIcon');
            const messageEl = document.getElementById('notificationMessage');
            
            notification.className = 'notification show ' + type;
            icon.textContent = type === 'warning' ? '⚠️' : type === 'error' ? '❌' : '✅';
            messageEl.textContent = message;
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // ==================== ФУНКЦИИ РАБОТЫ С КОРЗИНОЙ ====================
        function loadCart() {
            try {
                const savedCart = localStorage.getItem('vapeopt_cart');
                cart = savedCart ? JSON.parse(savedCart) : [];
            } catch (error) {
                console.error('Ошибка загрузки корзины:', error);
                cart = [];
            }
            updateCartDisplay();
            updateCartIcon();
        }

        function saveCart() {
            localStorage.setItem('vapeopt_cart', JSON.stringify(cart));
            updateCartDisplay();
            updateCartIcon();
        }

        function updateCartIcon() {
            const cartIcon = document.getElementById('cartIcon');
            const cartCount = document.getElementById('cartCount');
            
            if (cart.length > 0) {
                cartIcon.classList.remove('hidden');
                const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
                cartCount.textContent = totalItems;
            } else {
                cartIcon.classList.add('hidden');
            }
        }

        function updateCartDisplay() {
            const cartItemsGrid = document.getElementById('cartItemsGrid');
            const summaryItems = document.getElementById('summaryItems');
            const summaryPrice = document.getElementById('summaryPrice');
            
            if (!cartItemsGrid) return;

            if (cart.length === 0) {
                cartItemsGrid.innerHTML = '<div class="cart-empty">🛒 КОРЗИНА ПУСТА</div>';
                summaryItems.textContent = '0';
                summaryPrice.textContent = '0';
                return;
            }

            let html = '';
            let totalItems = 0;
            let totalPrice = 0;

            cart.forEach((item, index) => {
                totalItems += item.quantity;
                totalPrice += item.price * item.quantity;

                let itemDetails = '';
                let link = '';

                // Формируем детали и ссылку в зависимости от типа товара
                if (item.flavorName) {
                    itemDetails = `${item.flavorName} • ${item.strengthText || '0'} мг • ${item.volume || 30} мл`;
                    link = 'zhidkosti.html';
                } else if (item.resistance) {
                    itemDetails = `${item.itemName} • ${item.resistance} Ом • ${item.volume || 30} мл`;
                    link = 'rashodniki.html';
                } else if (item.type === 'pod') {
                    itemDetails = `${item.itemName}`;
                    link = 'pod.html';
                } else if (item.strength && item.puffs) {
                    itemDetails = `${item.itemName} • ${item.strength}% • ${item.puffs} тяг`;
                    link = 'odnorazki.html';
                } else if (item.type === 'snus') {
                    itemDetails = `${item.itemName} • ${item.strength} мг`;
                    link = 'snus.html';
                }

                html += `
                    <div class="cart-item-card" onclick="window.location.href='${link}'">
                        <img src="${item.image || 'https://via.placeholder.com/70x70/10213f/3e7bff?text=' + encodeURIComponent(item.name.substring(0, 3))}" 
                             class="cart-item-image"
                             onerror="this.src='https://via.placeholder.com/70x70/10213f/3e7bff?text=Нет+фото'">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-details">${itemDetails}</div>
                        <div class="cart-item-price-block">
                            <span class="cart-item-price">${item.price} ₽</span>
                            <span class="cart-item-quantity">${item.quantity} шт</span>
                        </div>
                    </div>
                `;
            });

            cartItemsGrid.innerHTML = html;
            summaryItems.textContent = totalItems;
            summaryPrice.textContent = totalPrice;
        }

        // ==================== ПОЛУЧЕНИЕ НОМЕРА ЗАКАЗА ====================
        async function getNextOrderNumber() {
            try {
                const orders = await FirestoreService.getCollection('orders');
                if (orders.length === 0) return 1;
                
                // Находим максимальный номер заказа
                const maxNumber = Math.max(...orders.map(o => o.orderNumber || 0));
                return maxNumber + 1;
            } catch (error) {
                console.error('Ошибка получения номера заказа:', error);
                return 1;
            }
        }

        // ==================== ОФОРМЛЕНИЕ ЗАКАЗА ====================
        async function checkout() {
            const telegramInput = document.getElementById('telegramUsername');
            const nameInput = document.getElementById('customerName');
            const telegramField = document.getElementById('telegramField');
            const nameField = document.getElementById('nameField');
            
            let hasError = false;

            // Убираем старые ошибки
            telegramField.classList.remove('error');
            nameField.classList.remove('error');

            // Проверяем Telegram username
            if (!telegramInput.value.trim()) {
                telegramField.classList.add('error');
                showNotification('Заполните Telegram username', 'warning');
                telegramInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                hasError = true;
            } else if (!telegramInput.value.trim().startsWith('@')) {
                telegramField.classList.add('error');
                showNotification('Telegram username должен начинаться с @', 'warning');
                telegramInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                hasError = true;
            }

            // Проверяем имя
            if (!nameInput.value.trim()) {
                nameField.classList.add('error');
                if (!hasError) {
                    showNotification('Заполните поле Имя', 'warning');
                    nameInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    // Если обе ошибки, показываем второе уведомление чуть позже
                    setTimeout(() => {
                        showNotification('Заполните поле Имя', 'warning');
                    }, 500);
                    
                    // Скроллим к полям, чтобы оба были видны
                    telegramField.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
                hasError = true;
            }

            if (hasError || cart.length === 0) return;

            try {
                const nextNumber = await getNextOrderNumber();
                
                const order = {
                    orderNumber: nextNumber,
                    orderId: `№${String(nextNumber).padStart(3, '0')}`,
                    items: cart,
                    customer: {
                        telegram: telegramInput.value.trim(),
                        name: nameInput.value.trim()
                    },
                    totalItems: cart.reduce((sum, item) => sum + item.quantity, 0),
                    totalPrice: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0),
                    status: 'pending', // pending = невыполненный
                    createdAt: new Date().toISOString(),
                    currency: 'BYN'
                };

                await FirestoreService.saveDocument('orders', order);
                
                // Очищаем корзину и поля
                cart = [];
                saveCart();
                telegramInput.value = '';
                nameInput.value = '';
                
                showNotification('Заказ успешно оформлен!', 'success');
                
                // Закрываем модальное окно корзины
                document.getElementById('cartModal').classList.remove('show');
                
            } catch (error) {
                console.error('Ошибка оформления заказа:', error);
                showNotification('Ошибка при оформлении заказа', 'error');
            }
        }

        // ==================== ФУНКЦИИ ДЛЯ ГЛАВНОЙ СТРАНИЦЫ ====================
        async function getSectionCounts() {
            try {
                const [liquids, consumables, pod, disposables, snus] = await Promise.all([
                    FirestoreService.getCollection('liquids'),
                    FirestoreService.getCollection('consumables'),
                    FirestoreService.getCollection('pod'),
                    FirestoreService.getCollection('disposables'),
                    FirestoreService.getCollection('snus')
                ]);

                const liquidsInStock = liquids.filter(l => 
                    l.flavors && l.flavors.some(f => f.inStock !== false)
                ).length;

                const consumablesInStock = consumables.filter(c => 
                    c.items && c.items.some(item => item.inStock !== false)
                ).length;

                const podInStock = pod.filter(p => 
                    p.items && p.items.some(item => item.inStock !== false)
                ).length;

                const disposablesInStock = disposables.filter(d => 
                    d.items && d.items.some(item => item.inStock !== false)
                ).length;

                const snusInStock = snus.filter(s => 
                    s.items && s.items.some(item => item.inStock !== false)
                ).length;

                return {
                    liquids: liquidsInStock,
                    consumables: consumablesInStock,
                    pod: podInStock,
                    disposable: disposablesInStock,
                    snus: snusInStock
                };
            } catch (error) {
                console.error('Ошибка получения количества товаров:', error);
                return { liquids: 0, consumables: 0, pod: 0, disposable: 0, snus: 0 };
            }
        }

        function getCountClass(count) {
            return count > 0 ? 'positive' : 'zero';
        }

        function getCountText(count) {
            return count > 0 ? `В наличии: ${count}` : 'Нет в наличии';
        }

        function createModule(section, count) {
            const module = document.createElement('div');
            module.className = 'cargo-module';
            
            const countClass = getCountClass(count);
            const countText = getCountText(count);

            module.innerHTML = `
                <span class="cargo-icon">${section.icon}</span>
                <span class="cargo-name">${section.name}</span>
                <span class="cargo-data ${countClass}" data-id="${section.id}">${countText}</span>
            `;

            module.addEventListener('click', function(e) {
                if (e.target.classList.contains('cargo-data')) {
                    return;
                }
                window.location.href = section.link;
            });

            const countElement = module.querySelector('.cargo-data');
            countElement.addEventListener('click', function(e) {
                e.stopPropagation();
                if (count > 0) {
                    window.location.href = section.link;
                }
            });

            return module;
        }

        async function updateAllSections() {
            const counts = await getSectionCounts();
            
            const grid = document.getElementById('shipGrid');
            grid.innerHTML = '';
            
            for (let i = 0; i < 4; i++) {
                const count = i === 0 ? counts.liquids :
                             i === 1 ? counts.consumables :
                             i === 2 ? counts.pod :
                             counts.disposable;
                grid.appendChild(createModule(sections[i], count));
            }
            
            const lastRow = document.createElement('div');
            lastRow.className = 'last-row';
            
            const snusModule = createModule(sections[4], counts.snus);
            lastRow.appendChild(snusModule);
            
            const emptyModule = document.createElement('div');
            emptyModule.style.visibility = 'hidden';
            emptyModule.style.pointerEvents = 'none';
            emptyModule.className = 'cargo-module';
            emptyModule.style.background = 'transparent';
            emptyModule.style.boxShadow = 'none';
            emptyModule.style.border = 'none';
            lastRow.appendChild(emptyModule);
            
            grid.appendChild(lastRow);
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        async function init() {
            console.log('Инициализация index.html');
            
            await updateAllSections();
            loadCart();

            // Подписываемся на изменения в Firebase
            FirestoreService.subscribeToCollection('liquids', () => updateAllSections());
            FirestoreService.subscribeToCollection('consumables', () => updateAllSections());
            FirestoreService.subscribeToCollection('pod', () => updateAllSections());
            FirestoreService.subscribeToCollection('disposables', () => updateAllSections());
            FirestoreService.subscribeToCollection('snus', () => updateAllSections());

            // ========== КНОПКА ВХОДА В АДМИН-ПАНЕЛЬ ==========
            // Код оставлен для совместимости, но теперь кнопка работает как обычная ссылка
            const adminLoginBtn = document.getElementById('adminLoginBtn');
            console.log('Кнопка adminLoginBtn:', adminLoginBtn);
            
            if (adminLoginBtn) {
                // Убираем старый обработчик, чтобы не мешал ссылке
                // Теперь кнопка работает как обычная ссылка благодаря тегу <a>
                console.log('Кнопка входа теперь работает как ссылка на login.html');
            }

            // ========== КОРЗИНА ==========
            const cartIcon = document.getElementById('cartIcon');
            const cartModal = document.getElementById('cartModal');
            const closeCart = document.getElementById('closeCart');
            const checkoutBtn = document.getElementById('checkoutBtn');

            if (cartIcon) {
                cartIcon.addEventListener('click', () => {
                    cartModal.classList.add('show');
                    updateCartDisplay();
                });
            }

            if (closeCart) {
                closeCart.addEventListener('click', () => {
                    cartModal.classList.remove('show');
                });
            }

            if (checkoutBtn) {
                checkoutBtn.addEventListener('click', checkout);
            }

            if (cartModal) {
                cartModal.addEventListener('click', (e) => {
                    if (e.target === cartModal) {
                        cartModal.classList.remove('show');
                    }
                });
            }

            // Слушаем изменения localStorage для синхронизации
            window.addEventListener('storage', function(e) {
                if (e.key === 'vapeopt_cart') {
                    cart = JSON.parse(e.newValue || '[]');
                    updateCartIcon();
                }
            });
        }

        // Запускаем инициализацию после загрузки страницы
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
